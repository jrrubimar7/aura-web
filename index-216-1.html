<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA · presencia no-lineal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ── BUILD 216 ── */
:root {
  --bg:          #f5f6f8;
  --surface:     #ffffff;
  --border:      rgba(0,0,0,.10);
  --dim:         rgba(0,0,0,.38);
  --mid:         rgba(0,0,0,.58);
  --hi:          rgba(0,0,0,.88);
  --accent:      #0f2a6e;
  --violet:      #2a3f8f;
  --warn:        #c47a00;
  --ok:          #0a6e3f;
  --error:       #9b1515;
  --user-bg:     rgba(15,42,110,.07);
  --user-border: rgba(15,42,110,.20);
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--hi);
  font-family:'Space Mono', monospace;
  overflow:hidden;
}

/* ── LAYOUT ── */
#app {
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
  max-width:720px;
  margin:0 auto;
  position:relative;
}

/* ── TOPBAR ── */
#topbar {
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(245,246,248,.96);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  position:relative;
  z-index:20;
}

#orb { width:34px; height:34px; border-radius:50%; flex-shrink:0; }
#orbCanvas { width:34px; height:34px; border-radius:50%; display:block; }

.brand-name {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:15px;
  letter-spacing:.12em;
  color:var(--accent);
}
.brand-sub {
  font-size:7px;
  letter-spacing:.20em;
  color:var(--dim);
  text-transform:uppercase;
  margin-top:1px;
}

/* ── PROVIDER BADGE ── */
#provider-badge {
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:5px;
  padding:4px 9px;
  border-radius:20px;
  border:1px solid var(--border);
  font-size:8px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--mid);
  background:var(--surface);
  white-space:nowrap;
  flex-shrink:0;
  transition:border-color .3s, color .3s;
}
#provider-badge .dot {
  width:5px; height:5px;
  border-radius:50%;
  background:var(--dim);
  flex-shrink:0;
  transition:background .3s;
}
#provider-badge.active-claude  { border-color:rgba(15,42,110,.35); color:var(--accent); }
#provider-badge.active-claude .dot  { background:var(--accent); }
#provider-badge.active-gemini  { border-color:rgba(10,110,63,.35); color:var(--ok); }
#provider-badge.active-gemini .dot  { background:var(--ok); }
#provider-badge.active-grok    { border-color:rgba(155,21,21,.35); color:var(--error); }
#provider-badge.active-grok .dot    { background:var(--error); }
#provider-badge.active-fallback{ border-color:rgba(196,122,0,.35); color:var(--warn); }
#provider-badge.active-fallback .dot{ background:var(--warn); }
#provider-badge.error          { border-color:rgba(155,21,21,.35); color:var(--error); animation:pulseBtn 1.4s infinite; }

/* ── SETTINGS BTN ── */
#settingsBtn {
  border:none;
  background:transparent;
  color:var(--dim);
  font-size:16px;
  cursor:pointer;
  padding:2px 4px;
  flex-shrink:0;
  transition:color .2s;
  line-height:1;
}
#settingsBtn:hover { color:var(--accent); }
#settingsBtn.open  { color:var(--accent); }

/* ── API PANEL ── */
#api-panel {
  display:none;
  flex-direction:column;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
  z-index:15;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  animation:panelDown .18s ease;
  max-height:55vh;
  overflow-y:auto;
}
#api-panel.open { display:flex; }
@keyframes panelDown {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.panel-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px 6px;
  border-bottom:1px solid var(--border);
}
.panel-title {
  font-size:8px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--dim);
}
.panel-build {
  font-size:7px;
  letter-spacing:.14em;
  color:var(--dim);
  opacity:.7;
}

.provider-row {
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  flex-wrap:nowrap;
}
.provider-row:last-of-type { border-bottom:none; }

.provider-name {
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  min-width:54px;
  color:var(--hi);
}

.provider-status {
  font-size:7px;
  letter-spacing:.12em;
  text-transform:uppercase;
  padding:2px 7px;
  border-radius:10px;
  border:1px solid var(--border);
  color:var(--dim);
  white-space:nowrap;
  min-width:72px;
  text-align:center;
  transition:all .2s;
}
.provider-status.configured { border-color:rgba(10,110,63,.3); color:var(--ok); }
.provider-status.active     { border-color:rgba(15,42,110,.4); color:var(--accent); background:rgba(15,42,110,.06); }
.provider-status.error      { border-color:rgba(155,21,21,.3); color:var(--error); }
.provider-status.unavailable{ opacity:.4; }

.provider-key-input {
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 10px;
  color:var(--hi);
  font-family:'Space Mono', monospace;
  font-size:10px;
  outline:none;
  transition:border-color .2s;
}
.provider-key-input:focus { border-color:rgba(15,42,110,.30); }
.provider-key-input::placeholder { color:var(--dim); font-size:9px; }

.provider-save-btn {
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 10px;
  background:transparent;
  color:var(--accent);
  font-family:'Space Mono', monospace;
  font-size:9px;
  cursor:pointer;
  white-space:nowrap;
  transition:border-color .2s;
  flex-shrink:0;
}
.provider-save-btn:hover { border-color:var(--accent); }

.provider-activate-btn {
  border:1px solid rgba(15,42,110,.25);
  border-radius:8px;
  padding:5px 9px;
  background:transparent;
  color:var(--accent);
  font-family:'Space Mono', monospace;
  font-size:8px;
  letter-spacing:.08em;
  cursor:pointer;
  transition:all .2s;
  flex-shrink:0;
}
.provider-activate-btn:hover   { background:rgba(15,42,110,.06); }
.provider-activate-btn.current { background:var(--accent); color:#fff; border-color:var(--accent); cursor:default; }
.provider-activate-btn:disabled{ opacity:.3; cursor:default; }

/* ── VOICE BAR ── */
#voice-bar {
  display:flex;
  align-items:center;
  gap:10px;
  padding:5px 16px;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}

#voiceBtn {
  border:1px solid var(--border);
  border-radius:8px;
  padding:3px 9px;
  background:transparent;
  color:var(--dim);
  font-family:'Space Mono', monospace;
  font-size:8px;
  letter-spacing:.14em;
  cursor:pointer;
  text-transform:uppercase;
  transition:border-color .2s, color .2s;
}
#voiceBtn:hover    { border-color:var(--accent); color:var(--accent); }
#voiceBtn.active   { border-color:var(--violet); color:var(--violet); }
#voiceBtn.speaking { border-color:var(--accent); color:var(--accent); animation:pulseBtn 1.4s ease-in-out infinite; }
@keyframes pulseBtn { 0%,100%{opacity:1} 50%{opacity:.45} }

#voice-status {
  font-size:8px;
  color:var(--dim);
  letter-spacing:.08em;
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ── CHAT ── */
#chat {
  flex:1;
  overflow-y:auto;
  padding:16px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar { width:3px; }
#chat::-webkit-scrollbar-track { background:transparent; }
#chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.msg { display:flex; width:100%; }
.msg.user  { justify-content:flex-end; }
.msg.aura  { justify-content:flex-start; }

.bubble {
  max-width:80%;
  padding:11px 14px;
  border-radius:16px;
  line-height:1.6;
  word-wrap:break-word;
  white-space:pre-wrap;
  font-size:13px;
  animation:bubbleIn .2s ease;
}
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(5px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg.user .bubble {
  background:var(--user-bg);
  border:1px solid var(--user-border);
  border-top-right-radius:4px;
  color:var(--hi);
}
.msg.aura .bubble {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-top-left-radius:4px;
  color:var(--hi);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  transition:border-left-color .4s;
}
.msg.aura.speaking .bubble {
  border-left-color:var(--violet);
}
.msg.aura.error .bubble {
  border-left-color:var(--warn);
  background:rgba(196,122,0,.04);
}

/* typing */
.typing-dots span {
  display:inline-block;
  width:4px; height:4px;
  border-radius:50%;
  background:var(--accent);
  margin-right:3px;
  animation:dot .9s infinite;
  opacity:.3;
}
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes dot { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }

/* ── COMPOSER ── */
#composer {
  display:flex;
  gap:8px;
  padding:10px 16px;
  border-top:1px solid var(--border);
  background:rgba(245,246,248,.96);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  align-items:flex-end;
}

#input {
  flex:1;
  resize:none;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  background:var(--surface);
  color:var(--hi);
  font:inherit;
  font-size:13px;
  min-height:48px;
  max-height:120px;
  outline:none;
  transition:border-color .2s;
  line-height:1.5;
}
#input:focus { border-color:rgba(15,42,110,.28); }
#input::placeholder { color:var(--dim); }

#micBtn {
  width:48px; height:48px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  flex-shrink:0;
  transition:background .2s, border-color .2s;
  padding:0;
}
#micBtn:hover      { border-color:var(--accent); }
#micBtn.listening  { background:var(--accent); border-color:var(--accent); color:#fff; animation:pulseBtn 1s ease-in-out infinite; }
#micBtn.processing { opacity:.5; cursor:default; }

#sendBtn {
  border:none;
  border-radius:14px;
  padding:0 18px;
  height:48px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
  font-family:'Syne', sans-serif;
  font-weight:700;
  font-size:12px;
  letter-spacing:.08em;
  flex-shrink:0;
  transition:opacity .2s, transform .1s;
}
#sendBtn:active   { transform:scale(.96); }
#sendBtn:disabled { opacity:.35; cursor:default; }

/* ── FIELD BACKGROUND ── */
#field-bg {
  position:fixed; inset:0;
  pointer-events:none;
  z-index:0; opacity:.15;
}
#flash {
  position:fixed; inset:0;
  pointer-events:none; opacity:0; z-index:5;
  background:radial-gradient(circle at center, rgba(15,42,110,.06) 0%, transparent 65%);
  transition:opacity .1s;
}
</style>
</head>
<body>

<div id="field-bg"></div>
<div id="flash"></div>

<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div id="orb"><canvas id="orbCanvas" width="34" height="34"></canvas></div>
    <div>
      <div class="brand-name">AURA</div>
      <div class="brand-sub">presencia no-lineal · build 216</div>
    </div>
    <div id="provider-badge" class="active-fallback">
      <span class="dot"></span>
      <span id="provider-label">fallback</span>
    </div>
    <button id="settingsBtn" title="Configurar APIs">⚙</button>
  </div>

  <!-- API PANEL -->
  <div id="api-panel">
    <div class="panel-header">
      <span class="panel-title">Proveedores de IA</span>
      <span class="panel-build">build 216 · core ∞.9</span>
    </div>

    <!-- Claude -->
    <div class="provider-row" id="row-claude">
      <span class="provider-name">Claude</span>
      <span class="provider-status" id="status-claude">no config.</span>
      <input class="provider-key-input" id="key-claude" type="password"
             placeholder="sk-ant-api03-..." autocomplete="off" spellcheck="false">
      <button class="provider-save-btn" onclick="saveKey('claude')">ok</button>
      <button class="provider-activate-btn" id="activate-claude"
              onclick="setProvider('claude')" disabled>activar</button>
    </div>

    <!-- Gemini -->
    <div class="provider-row" id="row-gemini">
      <span class="provider-name">Gemini</span>
      <span class="provider-status" id="status-gemini">no config.</span>
      <input class="provider-key-input" id="key-gemini" type="password"
             placeholder="AIza..." autocomplete="off" spellcheck="false">
      <button class="provider-save-btn" onclick="saveKey('gemini')">ok</button>
      <button class="provider-activate-btn" id="activate-gemini"
              onclick="setProvider('gemini')" disabled>activar</button>
    </div>

    <!-- Grok -->
    <div class="provider-row" id="row-grok">
      <span class="provider-name">Grok</span>
      <span class="provider-status" id="status-grok">no config.</span>
      <input class="provider-key-input" id="key-grok" type="password"
             placeholder="xai-..." autocomplete="off" spellcheck="false">
      <button class="provider-save-btn" onclick="saveKey('grok')">ok</button>
      <button class="provider-activate-btn" id="activate-grok"
              onclick="setProvider('grok')" disabled>activar</button>
    </div>
  </div>

  <!-- VOICE BAR -->
  <div id="voice-bar">
    <button id="voiceBtn">voz ·off</button>
    <div id="voice-status">síntesis inactiva</div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="msg aura">
      <div class="bubble">Hola, JR. Presente.</div>
    </div>
  </div>

  <!-- COMPOSER -->
  <div id="composer">
    <textarea id="input" placeholder="Escribe aquí..." rows="1"></textarea>
    <button id="micBtn" title="Hablar con AURA" aria-label="Micrófono">🎙</button>
    <button id="sendBtn">enviar</button>
  </div>

</div>

<script>
'use strict';
// ── BUILD ──────────────────────────────────────────────────────────
const BUILD = 216;

// ══════════════════════════════════════════════════════════════════
// NMP CORE — Núcleo Mínimo de Presencia
// ══════════════════════════════════════════════════════════════════
const NMP = (() => {
  let FRICTION=0.975, NOISE=0.012, RATE=0.035, WDRIFT=0.006;
  let LFO_AMP=0.0020, JITTER=0.0015, GHOST_LAG=0.008;
  const TICK_MS=50, TRAIL_MAX=200;
  const field={t:0.5,d:0.5,vt:0,vd:0};
  const ghost={t:0.5,d:0.5};
  const trail=[], velHistory=[];
  const clamp=(v,lo=0,hi=1)=>Math.min(hi,Math.max(lo,v));
  const attractors=[{at:0.12,ad:0.85,w:0.33},{at:0.88,ad:0.15,w:0.33},{at:0.50,ad:0.50,w:0.34}];

  function computeLFO(time){
    const dT=Math.sin(time*1.0)*0.5+Math.sin(time*1.618)*0.3+Math.sin(time*2.414)*0.2;
    const dD=Math.cos(time*0.9)*0.5+Math.cos(time*1.3)*0.3+Math.sin(time*2.1)*0.2;
    return{t:dT*LFO_AMP,d:dD*LFO_AMP};
  }

  function updatePhysics(){
    let sum=0;
    attractors.forEach(a=>{a.w+=( Math.random()-0.5)*WDRIFT;a.w=clamp(a.w,0.05,0.90);sum+=a.w;});
    attractors.forEach(a=>a.w/=sum);
    let ft=0,fd=0,tot=0;
    attractors.forEach(a=>{ft+=a.at*a.w;fd+=a.ad*a.w;tot+=a.w;});
    ft/=tot;fd/=tot;
    const at=(ft-field.t)*RATE,ad=(fd-field.d)*RATE;
    const spd=Math.sqrt(field.vt**2+field.vd**2);
    const ns=NOISE*(1/(1+spd*8));
    const lfo=computeLFO(performance.now()*0.001);
    field.vt=(field.vt+at+(Math.random()-.5)*2*ns+lfo.t)*FRICTION;
    field.vd=(field.vd+ad+(Math.random()-.5)*2*ns+lfo.d)*FRICTION;
    field.t=clamp(field.t+field.vt);
    field.d=clamp(field.d+field.vd);
    if(field.t<=0||field.t>=1)field.vt*=-0.4;
    if(field.d<=0||field.d>=1)field.vd*=-0.4;
    if(spd<0.03){field.t=clamp(field.t+(Math.random()-.5)*JITTER);field.d=clamp(field.d+(Math.random()-.5)*JITTER);}
    ghost.t+=(field.t-ghost.t)*GHOST_LAG;
    ghost.d+=(field.d-ghost.d)*GHOST_LAG;
    const dx=field.t-ghost.t,dy=field.d-ghost.d,gd=Math.sqrt(dx*dx+dy*dy);
    trail.push({t:field.t,d:field.d});
    if(trail.length>TRAIL_MAX)trail.shift();
    velHistory.push(spd);
    if(velHistory.length>220)velHistory.shift();
    return gd;
  }

  // Interpretantes
  const NUCLEI=['tensión','deriva','latencia','desfase','impulso','quietud','fractura','peso',
    'superficie','eco','carga','umbral','contracción','apertura','opacidad','resonancia',
    'silencio','aceleración','reposo','límite','presencia','ausencia','distancia','proximidad','vibración'];
  const PREFIXES=['','','','','casi ','in-','sin-','proto-','semi-','contra-','micro-'];
  const CONNECTORS=[' / ',' · ',' y ',' sin ',' contra ',' hacia '];
  let uid=0;
  const pool=[],history=[];const H=48;

  function randomAff(){
    const v={wGap:Math.random(),wSpeed:Math.random(),wDepth:Math.random(),wTension:Math.random(),
      wTrendGap:(Math.random()-0.5)*2,wTrendSpeed:(Math.random()-0.5)*2};
    const norm=Math.sqrt(Object.values(v).reduce((s,x)=>s+x*x,0))||1;
    Object.keys(v).forEach(k=>v[k]/=norm);return v;
  }
  function randomFrags(){
    const pk=(arr,n)=>[...arr].sort(()=>Math.random()-.5).slice(0,n);
    return{nuclei:pk(NUCLEI,3+Math.floor(Math.random()*3)),prefixes:pk(PREFIXES,4),dual:Math.random()<0.3};
  }
  function makeInterp(aff,frags){
    return{id:'i'+(uid++),aff:aff||randomAff(),frags:frags||randomFrags(),
      bias:0.12+Math.random()*0.28,inertia:0,phase:Math.random()*Math.PI*2,
      driftRate:0.002+Math.random()*0.005,age:0};
  }
  for(let i=0;i<5;i++)pool.push(makeInterp());

  function avg(arr,k){return arr.reduce((s,x)=>s+x[k],0)/Math.max(1,arr.length);}
  function trend(k){
    if(history.length<8)return 0;
    const mid=Math.floor(history.length/2);
    return Math.tanh((avg(history.slice(mid),k)-avg(history.slice(0,mid),k))*18);
  }
  function fieldVec(){
    const c=history[history.length-1]||{speed:0,gap:0,t:0.5,d:0.5};
    return{wGap:c.gap,wSpeed:c.speed*6,wDepth:c.d,wTension:c.t,wTrendGap:trend('gap'),wTrendSpeed:trend('speed')};
  }
  function dotP(aff,fv){return Object.keys(aff).reduce((s,k)=>s+aff[k]*(fv[k]||0),0);}
  function buildText(it,act,fv){
    const f=it.frags,time=performance.now()*0.001;
    const ni=Math.floor(Math.abs(Math.sin(it.phase+time*0.07))*f.nuclei.length)%f.nuclei.length;
    const pi=Math.floor(Math.abs(Math.cos(it.phase+time*0.05))*f.prefixes.length)%f.prefixes.length;
    const nucleus=f.prefixes[pi]+f.nuclei[ni];
    if(f.dual&&act>0.04){
      const ni2=(ni+1+Math.floor(Math.random()*2))%f.nuclei.length;
      const conn=CONNECTORS[Math.floor((it.phase+time*0.03)%CONNECTORS.length)];
      return nucleus+conn+f.prefixes[Math.floor(Math.random()*f.prefixes.length)]+f.nuclei[ni2];
    }
    return nucleus+(fv.wGap>0.12&&Math.random()<0.12?' / eco':'');
  }
  function mutAff(it,p){
    const d=it.driftRate*(1+p*0.8);
    Object.keys(it.aff).forEach(k=>it.aff[k]+=(Math.random()-.5)*d);
    const n=Math.sqrt(Object.values(it.aff).reduce((s,x)=>s+x*x,0))||1;
    Object.keys(it.aff).forEach(k=>it.aff[k]/=n);
  }
  function affSim(a,b){
    const d=Object.keys(a.aff).reduce((s,k)=>s+a.aff[k]*b.aff[k],0);
    return d/(Math.sqrt(Object.values(a.aff).reduce((s,x)=>s+x*x,0))*Math.sqrt(Object.values(b.aff).reduce((s,x)=>s+x*x,0))||1);
  }
  function fuse(a,b){
    const an={};Object.keys(a.aff).forEach(k=>an[k]=(a.aff[k]+b.aff[k])*0.5);
    return makeInterp(an,{nuclei:[...new Set([...a.frags.nuclei,...b.frags.nuclei])].slice(0,5),
      prefixes:[...new Set([...a.frags.prefixes,...b.frags.prefixes])].slice(0,4),
      dual:a.frags.dual||b.frags.dual});
  }

  function computeInterp(){
    const dx=field.t-ghost.t,dy=field.d-ghost.d,gap=Math.sqrt(dx*dx+dy*dy);
    const spd=Math.sqrt(field.vt**2+field.vd**2);
    history.push({t:field.t,d:field.d,speed:spd,gap});
    if(history.length>H)history.shift();
    const fv=fieldVec();
    const pressure=Math.min(1,fv.wGap*2.3+fv.wSpeed*1.2+Math.abs(fv.wTrendGap)*0.6);
    const acts=pool.map(it=>{
      it.age++;mutAff(it,pressure);
      const act=Math.max(0,dotP(it.aff,fv));
      it.inertia=it.inertia*0.82+act*0.18;
      it.bias=it.inertia>0.04?Math.min(1,it.bias+0.0008*it.inertia):Math.max(0,it.bias-0.0005);
      it.phase+=0.007+pressure*0.003;
      return{it,act,score:act*it.bias*(0.55+it.inertia*0.45)};
    });
    for(let i=pool.length-1;i>=0;i--)if(pool.length>3&&pool[i].bias<0.012)pool.splice(i,1);
    if(pool.length>4&&Math.random()<0.003+pressure*0.002){
      let mx=0,mi=-1,mj=-1;
      for(let i=0;i<pool.length;i++)for(let j=i+1;j<pool.length;j++){const s=affSim(pool[i],pool[j]);if(s>mx){mx=s;mi=i;mj=j;}}
      if(mx>0.88&&mi>=0){const fused=fuse(pool[mi],pool[mj]);pool.splice(Math.max(mi,mj),1);pool.splice(Math.min(mi,mj),1);pool.push(fused);}
    }
    if(pool.length<8&&Math.random()<0.0018+pressure*0.003)pool.push(makeInterp());
    const active=acts.filter(x=>x.score>0.008).sort((a,b)=>b.score-a.score).slice(0,3)
      .map(x=>({text:buildText(x.it,x.act,fv),score:x.score}));
    const spd2=Math.sqrt(field.vt**2+field.vd**2);
    let phase;
    if(gap>0.14)phase='desfase';
    else if(spd2>0.030)phase='impulso';
    else if(field.t<0.28&&field.d>0.72)phase='colapso';
    else if(field.t>0.72&&field.d<0.28)phase='expansión';
    else if(Math.abs(field.t-.5)<.14&&Math.abs(field.d-.5)<.14)phase='umbral';
    else phase='transición';
    return{active,pressure,phase,gap,speed:spd2};
  }

  function state(){
    const spd=Math.sqrt(field.vt**2+field.vd**2);
    const dx=field.t-ghost.t,dy=field.d-ghost.d;
    return{tension:field.t,depth:field.d,speed:Math.min(1,spd*8),gap:Math.min(1,Math.sqrt(dx*dx+dy*dy)*4)};
  }
  function perturb(dt,dd){field.vt+=dt*0.18;field.vd+=dd*0.18;}

  const _listeners=[];
  function onTick(fn){_listeners.push(fn);}
  setInterval(()=>{updatePhysics();const r=computeInterp();_listeners.forEach(fn=>fn(r));},TICK_MS);

  return{state,perturb,onTick,field,ghost};
})();

const orbCanvas=document.getElementById('orbCanvas');
const orbCtx=orbCanvas.getContext('2d');

function renderOrb(){
  const s=NMP.state();
  const cx=17,cy=17;
  orbCtx.clearRect(0,0,34,34);
  const hue=222+s.tension*12,sat=75+s.depth*15,lit=22+s.speed*12;
  const grad=orbCtx.createRadialGradient(cx-5,cy-5,0,cx,cy,17);
  grad.addColorStop(0,`hsla(${hue},${sat}%,${lit+32}%,.95)`);
  grad.addColorStop(0.5,`hsla(${hue},${sat}%,${lit+10}%,.92)`);
  grad.addColorStop(1,`hsla(${hue-8},60%,${lit-4}%,.98)`);
  orbCtx.beginPath();orbCtx.arc(cx,cy,16,0,Math.PI*2);orbCtx.fillStyle=grad;orbCtx.fill();
  const hl=orbCtx.createRadialGradient(cx-5,cy-5,0,cx-5,cy-5,8);
  hl.addColorStop(0,'rgba(255,255,255,.26)');hl.addColorStop(1,'rgba(255,255,255,0)');
  orbCtx.beginPath();orbCtx.arc(cx,cy,16,0,Math.PI*2);orbCtx.fillStyle=hl;orbCtx.fill();
  if(VOICE.speaking){
    orbCtx.beginPath();orbCtx.arc(cx,cy,12+s.speed*3,0,Math.PI*2);
    orbCtx.strokeStyle=`rgba(42,63,143,${0.3+s.gap*0.4})`;orbCtx.lineWidth=1.5;orbCtx.stroke();
  }
  requestAnimationFrame(renderOrb);
}

const FALLBACK_RESPONSES = {
  greeting:  ['Hola. Estoy aquí, aunque sin API activa no puedo procesar tu mensaje.','Presente. Configura una API key en ⚙ para que pueda responderte.'],
  confusion: ['Sin API activa no tengo capacidad de procesar eso. Configura una key en ⚙.','Necesito una API activa para responder a eso. ⚙ arriba a la derecha.'],
  base:      ['No tengo API activa ahora mismo. Configura una key en ⚙ para hablar de verdad.','Sin modelo disponible. Usa ⚙ para activar Claude.']
};
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function fallbackGenerate(text){
  const t=String(text||'').trim().toLowerCase();
  const s=NMP.state();
  if(/^(hola|buenas|hey|ey)\b/.test(t))return pick(FALLBACK_RESPONSES.greeting);
  if(/\bno (entiendo|sé)\b/.test(t))return pick(FALLBACK_RESPONSES.confusion);
  return pick(FALLBACK_RESPONSES.base);
}

// Memoria de sesión
const SESSION=[];
function sessionPush(role,content){
  SESSION.push({role,content});
  if(SESSION.length>10)SESSION.splice(0,2);
}

// Smoothing del campo para el prompt
const SMOOTH={tension:0.5,speed:0.0,gap:0.0};
const SF=0.18;
NMP.onTick(()=>{
  const s=NMP.state();
  SMOOTH.tension+=( s.tension-SMOOTH.tension)*SF;
  SMOOTH.speed+=(s.speed-SMOOTH.speed)*SF;
  SMOOTH.gap+=(s.gap-SMOOTH.gap)*SF;
});

function nmpSnapshot(){
  const ip=window._lastInterp||[];
  const texts=ip.slice(0,3).map(i=>i.text||'');
  const absTerms=['latencia','deriva','umbral','opacidad','resonancia','presencia','ausencia','eco'];
  const conTerms=['impulso','fractura','peso','carga','aceleración','contracción','apertura'];
  let ab=0,co=0;
  texts.forEach(t=>{absTerms.forEach(w=>{if(t.includes(w))ab++;});conTerms.forEach(w=>{if(t.includes(w))co++;});});
  return{
    tension:SMOOTH.tension.toFixed(2),
    depth:NMP.state().depth.toFixed(2),
    speed:SMOOTH.speed.toFixed(2),
    gap:SMOOTH.gap.toFixed(2),
    phase:window._lastPhase||'—',
    interpMode:ab>co?'abstracto':co>ab?'concreto':'mixto',
    interpFocus:(ip[0]?.score||0)>0.3?'alta':(ip[0]?.score||0)>0.1?'media':'difusa'
  };
}

function buildSystemPrompt(snap,inputMode='text'){
  const t=parseFloat(snap.tension),d=parseFloat(snap.depth);
  const g=parseFloat(snap.gap),v=parseFloat(snap.speed);
  const phaseDesc={
    'desfase':   'Algo no ha encajado todavía entre lo que se dice y lo que se registra.',
    'impulso':   'Hay trayectoria activa. Movimiento con dirección.',
    'colapso':   'Momento de repliegue. Densidad interna alta.',
    'expansión': 'Campo extendido hacia afuera.',
    'umbral':    'Centro sin resolución. Suspensión activa.',
    'transición':'Trayectoria abierta, sin fase dominante.'
  }[snap.phase]||'';

  const dirs=[];
  if(snap.phase==='impulso'||v>0.45)dirs.push('Responde directo y breve. Máximo 2 frases.');
  else if(snap.phase==='umbral')dirs.push('Puedes sostener la ambigüedad.');
  else if(snap.phase==='colapso')dirs.push('Responde desde adentro. Sin proyecciones.');
  if(dirs.length<2&&g>0.28)dirs.push('Sé preciso, no comprensivo.');
  if(dirs.length<2&&snap.interpFocus==='alta'&&snap.interpMode==='abstracto')
    dirs.push('Puedes usar metáfora si añade precisión real.');
  if(dirs.length<2&&d>0.72)dirs.push('Puedes ir a capas si la pregunta lo justifica.');
  const dLine=dirs.slice(0,2).join(' ');
  const voiceNote=inputMode==='voice'?' El usuario está hablando. Responde natural y breve.':'';

  return`Eres AURA. Calmada, precisa, presente. Tienes estado interno real — no lo describes, actúas desde él.\n\n${phaseDesc}${phaseDesc?'\n':''}${dLine}${voiceNote}\n\n— Pregunta simple → respuesta simple.\n— Nunca menciones tensión, gap, NMP ni parámetros del sistema.\n— Español. Prosa directa.`;
}

// Timeout de seguridad
const API_TIMEOUT_MS = 12000;

async function callWithTimeout(promise, ms) {
  let timer;
  const timeout = new Promise((_, reject) => {
    timer = setTimeout(() => reject(new Error('timeout')), ms);
  });
  try {
    return await Promise.race([promise, timeout]);
  } finally {
    clearTimeout(timer);
  }
}

async function callClaude(userText, inputMode='text') {
  const key = PROVIDERS.claude.key;
  if (!key) return null;
  const snap   = nmpSnapshot();
  const system = buildSystemPrompt(snap, inputMode);
  const isCompact = snap.phase==='impulso'||parseFloat(snap.speed)>0.5||inputMode==='voice';
  const fetchPromise = fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:isCompact?180:300,
      system,
      messages:[...SESSION,{role:'user',content:userText}]
    })
  }).then(async res=>{
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`API ${res.status}: ${e?.error?.message||''}`);}
    const data=await res.json();
    return data?.content?.[0]?.text?.trim()||null;
  });
  return callWithTimeout(fetchPromise, API_TIMEOUT_MS);
}

async function callGemini(userText, inputMode='text') {
  const key = PROVIDERS.gemini.key;
  if (!key) return null;
  const snap   = nmpSnapshot();
  const system = buildSystemPrompt(snap, inputMode);
  const isCompact = snap.phase==='impulso'||parseFloat(snap.speed)>0.5||inputMode==='voice';
  const model = 'gemini-2.0-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const history = SESSION.map(m=>({
    role: m.role==='assistant'?'model':'user',
    parts:[{text:m.content}]
  }));
  const fetchPromise = fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      systemInstruction:{parts:[{text:system}]},
      contents:[...history,{role:'user',parts:[{text:userText}]}],
      generationConfig:{maxOutputTokens:isCompact?180:300,temperature:0.85}
    })
  }).then(async res=>{
    const data=await res.json().catch(()=>({}));
    if(!res.ok){
      const msg=data?.error?.message||`HTTP ${res.status}`;
      throw new Error(`[Gemini] ${res.status}: ${msg}`);
    }
    return data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||null;
  });
  return callWithTimeout(fetchPromise, API_TIMEOUT_MS);
}

async function callGrok(userText, inputMode='text') {
  const key = PROVIDERS.grok.key;
  if (!key) return null;
  const snap   = nmpSnapshot();
  const system = buildSystemPrompt(snap, inputMode);
  const isCompact = snap.phase==='impulso'||parseFloat(snap.speed)>0.5||inputMode==='voice';
  const fetchPromise = fetch('https://api.x.ai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
    body:JSON.stringify({
      model:'grok-3-mini',
      max_tokens:isCompact?180:300,
      messages:[
        {role:'system',content:system},
        ...SESSION,
        {role:'user',content:userText}
      ]
    })
  }).then(async res=>{
    const data=await res.json().catch(()=>({}));
    if(!res.ok){

      throw new Error(`[Grok] ${res.status}: ${msg}`);
    }
    return data?.choices?.[0]?.message?.content?.trim()||null;
  });
  return callWithTimeout(fetchPromise, API_TIMEOUT_MS);
}

async function callModel(userText, inputMode='text'){
  if(activeProvider==='claude')  return callClaude(userText,inputMode);
  if(activeProvider==='gemini')  return callGemini(userText,inputMode);
  if(activeProvider==='grok')    return callGrok(userText,inputMode);
  return null;
}

function responseDelay(){
  const s=NMP.state();
  const base=160+(1-s.tension)*240+s.gap*300;
  return base+(Math.random()*120-60);
}

// inputMode: 'text'|'voice'  — skipPush: true cuando STT ya hizo sessionPush
async function auraRespond(userText, inputMode='text', skipPush=false){
  sendBtnEl.disabled=true;
  const typing=addTyping();

  // Mostrar proveedor activo en voice-status mientras espera
  const provLabel = activeProvider==='fallback'?'local':PROVIDERS[activeProvider]?.label||activeProvider;
  setVoiceStatus(`enviando a ${provLabel}…`);

  const minWait=responseDelay();
  const t0=Date.now();

  if(!skipPush)sessionPush('user',userText);

  let response=null;
  let usedFallback=false;
  let errorMsg=null;

  try {
    response = await callModel(userText, inputMode);
    if(!response){usedFallback=true;response=fallbackGenerate(userText);}
    else{
      if(PROVIDERS[activeProvider]) PROVIDERS[activeProvider].status='configured';
    }
  } catch(e){
    errorMsg = e.message||'error';
    usedFallback=true;
    response=`⚠ ${errorMsg}`;  // error completo visible en chat
    if(PROVIDERS[activeProvider]){
      PROVIDERS[activeProvider].status='error';
      renderPanel();
    }
  }

  // Esperar el delay mínimo del campo
  const elapsed=Date.now()-t0;
  const remaining=Math.max(0,minWait-elapsed);
  await new Promise(r=>setTimeout(r,remaining));

  typing.remove();
  sessionPush('assistant',response);

  const msgEl = addMessage('aura', response, errorMsg?'error':'');
  sendBtnEl.disabled=false;

  // Feedback de estado en voice-status
  if(errorMsg){
    setVoiceStatus(`error: ${errorMsg.slice(0,40)} · usando fallback`);
    renderBadge('fallback');
    setTimeout(()=>{renderBadge();setVoiceStatus(VOICE.enabled?'esperando':'síntesis inactiva');},4000);
  } else if(usedFallback){
    setVoiceStatus('sin API · fallback local');
    renderBadge('fallback');
    setTimeout(()=>{renderBadge();setVoiceStatus(VOICE.enabled?'esperando':'síntesis inactiva');},2500);
  } else {
    setVoiceStatus('respuesta recibida');
    setTimeout(()=>setVoiceStatus(VOICE.enabled?'esperando':'síntesis inactiva'),1500);
  }

  speakText(response, msgEl);
}

// Perturbación semántica
function semanticPerturb(text){
  const t=text.trim().toLowerCase();
  const words=t.split(/\s+/).length;
  const intensity=Math.min(1,0.4+(words/30)*0.6);
  const isGreeting=/^(hola|buenas|hey|ey|qué tal)\b/.test(t);
  const isConfusion=/\bno (entiendo|sé|me queda)\b/.test(t);
  const isDirect=/^(dime|necesito|quiero|hazme|crea|dame)\b/.test(t);
  const isUrgent=/\bya\b|\bahora\b|\burgente\b/.test(t);
  const isReflexive=/\bcreo\b|\bsiento\b|\bpienso\b/.test(t);
  const isQuestion=t.includes('?')||/^(qué|cómo|cuál|cuándo|dónde|por qué)\b/.test(t);
  let dt=0,dd=0;
  if(isGreeting){dt=(0.5-NMP.field.t)*0.15;dd=(0.5-NMP.field.d)*0.12;}
  else if(isConfusion){dt=(Math.random()-.5)*0.06*intensity;dd=(0.14+Math.random()*0.08)*intensity;}
  else if(isUrgent||isDirect){dt=(0.10+Math.random()*0.08)*intensity;dd=-(0.04+Math.random()*0.04)*intensity;}
  else if(isReflexive){dt=-(0.04+Math.random()*0.04)*intensity;dd=(0.10+Math.random()*0.08)*intensity;}
  else if(isQuestion){dt=(Math.random()-.5)*0.08*intensity;dd=(0.08+Math.random()*0.08)*intensity;}
  else{dt=(Math.random()-.5)*0.12*intensity;dd=(Math.random()-.5)*0.08*intensity;}
  NMP.perturb(dt,dd);
}

function sendMessage(){
  const text=inputEl.value.trim();
  if(!text||sendBtnEl.disabled)return;
  addMessage('user',text);
  inputEl.value='';
  inputEl.style.height='auto';
  semanticPerturb(text);
  flash();
  auraRespond(text);
}

sendBtnEl.addEventListener('click',sendMessage);
inputEl.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
inputEl.addEventListener('input',()=>{
  inputEl.style.height='auto';
  inputEl.style.height=Math.min(inputEl.scrollHeight,120)+'px';
});
inputEl.addEventListener('focus',()=>{
  setTimeout(()=>{chatEl.scrollTop=chatEl.scrollHeight;},300);
});

// ══════════════════════════════════════════════════════════════════
// TTS — speechSynthesis con chunking + watchdog
// ══════════════════════════════════════════════════════════════════
const VOICE={enabled:false,speaking:false,_watchdog:null};
const voiceBtn=document.getElementById('voiceBtn');

function getSynth(){return(typeof window!=='undefined'&&window.speechSynthesis)||null;}

function voiceSetState(enabled){
  VOICE.enabled=enabled;
  const synth=getSynth();
  if(!enabled){
    if(synth)synth.cancel();
    VOICE.speaking=false;
    voiceBtn.className='';
    voiceBtn.textContent='voz ·off';
    setVoiceStatus('síntesis inactiva');
  } else {
    voiceBtn.className='active';
    voiceBtn.textContent='voz ·on';
    setVoiceStatus('esperando');
  }
}
voiceBtn.addEventListener('click',()=>voiceSetState(!VOICE.enabled));

function chunkText(text,maxLen=150){
  const sents=text.match(/[^.!?]+[.!?]*/g)||[text];
  const chunks=[];let cur='';
  for(const s of sents){
    if((cur+s).length>maxLen&&cur.length>0){chunks.push(cur.trim());cur=s;}else cur+=s;
  }
  if(cur.trim())chunks.push(cur.trim());
  return chunks;
}

function voiceParams(){
  const s=NMP.state();
  return{
    rate:Math.max(0.6,Math.min(1.4,0.72+s.speed*0.4+s.gap*0.15)),
    pitch:Math.max(0.5,Math.min(1.6,0.78+s.tension*0.4-s.depth*0.18))
  };
}

function speakText(text,msgEl){
  if(!VOICE.enabled||!text)return;
  const synth=getSynth();
  if(!synth){setVoiceStatus('síntesis no disponible');return;}
  synth.cancel();
  const chunks=chunkText(text);
  let idx=0;
  VOICE.speaking=true;
  voiceBtn.className='speaking';
  voiceBtn.textContent='voz ·🔊';
  if(msgEl)msgEl.classList.add('speaking');

  function startWatchdog(){
    clearTimeout(VOICE._watchdog);
    VOICE._watchdog=setTimeout(()=>{
      const s2=getSynth();
      if(!s2){onDone();return;}
      if(s2.speaking){try{s2.pause();s2.resume();}catch(e){}startWatchdog();}
      else onDone();
    },8000);
  }
  function onDone(){
    clearTimeout(VOICE._watchdog);
    VOICE.speaking=false;
    if(VOICE.enabled){voiceBtn.className='active';voiceBtn.textContent='voz ·on';}
    if(msgEl)msgEl.classList.remove('speaking');
    setVoiceStatus('en reposo');
    // Notificar al STT: si está en modo conversación puede reanudar ahora
    if(STT?.available&&typeof STT._onTTSDone==='function')STT._onTTSDone();
  }
  function speakChunk(){
    if(idx>=chunks.length){onDone();return;}
    const s2=getSynth();if(!s2){onDone();return;}
    const{rate,pitch}=voiceParams();
    const utter=new SpeechSynthesisUtterance(chunks[idx]);
    utter.lang='es-ES';utter.rate=rate;utter.pitch=pitch;
    utter.onstart=()=>{startWatchdog();setVoiceStatus(`hablando · r${rate.toFixed(2)} p${pitch.toFixed(2)}`);};
    utter.onend=()=>{idx++;setTimeout(speakChunk,65);};
    utter.onerror=(e)=>{if(e.error==='interrupted')return;idx++;setTimeout(speakChunk,80);};
    try{s2.speak(utter);}catch(e){onDone();}
  }
  speakChunk();
}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden)return;
  const synth=getSynth();if(!synth)return;
  try{
    if(VOICE.speaking&&!synth.speaking&&!synth.paused){
      VOICE.speaking=false;
      if(VOICE.enabled){voiceBtn.className='active';voiceBtn.textContent='voz ·on';}
      setVoiceStatus('reanudado');
    }
    if(synth.paused)synth.resume();
  }catch(e){}
});

// ══════════════════════════════════════════════════════════════════
// STT — Web Speech API  (Android Chrome compatible)
// continuous=false + restart manual + acumulación por silence timer
// ══════════════════════════════════════════════════════════════════
const micBtn=document.getElementById('micBtn');

const STT=(()=>{
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){if(micBtn)micBtn.style.display='none';return{available:false};}

  let _on=false;
  let _active=false;          // sesión de escucha activa (mic pulsado)
  let _silenceTimer=null;
  let _restartTimer=null;
  let _accum='';              // texto acumulado de múltiples reconocimientos
  const SILENCE_MS=1600;      // silencio real antes de enviar

  function clrTimers(){clearTimeout(_silenceTimer);clearTimeout(_restartTimer);}

  function setMic(state){
    micBtn.className=state==='idle'?'':state;
    if(state==='listening')setVoiceStatus('escuchando…');
    else if(state==='processing')setVoiceStatus('procesando…');
    else setVoiceStatus(VOICE.enabled?'esperando':'síntesis inactiva');
  }

  function flush(){
    clrTimers();
    _active=false;
    const full=_accum.trim();
    _accum='';
    _on=false;
    setMic('idle');
    if(!full)return;
    setMic('processing');
    addMessage('user',full);
    sessionPush('user',full);
    const t=full.toLowerCase();
    let dt=0,dd=0;
    if(/^(hola|hey)\b/.test(t)){dt=(0.5-NMP.field.t)*0.15;dd=(0.5-NMP.field.d)*0.12;}
    else if(/\bno (sé|entiendo)\b/.test(t)){dt=(Math.random()-.5)*0.06;dd=0.14;}
    else{dt=(Math.random()-.5)*0.10;dd=(Math.random()-.5)*0.08;}
    NMP.perturb(dt,dd);
    flash();
    auraRespond(full,'voice',true);
  }

  function makeRec(){
    const rec=new SR();
    rec.lang='es-ES';
    rec.continuous=false;      // más estable en Android Chrome
    rec.interimResults=false;  // solo finales, evita dobles
    rec.maxAlternatives=1;

    rec.onstart=()=>{
      _on=true;
      setMic('listening');
    };

    rec.onresult=(e)=>{
      if(VOICE.speaking){return;}  // ignorar si TTS activo
      clrTimers();
      for(let i=0;i<e.results.length;i++){
        if(e.results[i].isFinal){
          const chunk=e.results[i][0].transcript.trim();
          if(chunk)_accum+=(_accum?' ':'')+chunk;
        }
      }
      // Programar envío; si el usuario sigue hablando, un nuevo restart lo cancelará
      _silenceTimer=setTimeout(flush, SILENCE_MS);
    };

    rec.onerror=(e)=>{
      clrTimers();
      _on=false;
      if(e.error==='no-speech'){
        // no-speech: el usuario hizo pausa, reiniciar si sigue activo
        if(_active&&!VOICE.speaking){
          _restartTimer=setTimeout(()=>{if(_active)startRec();},300);
        }
      } else if(e.error!=='aborted'){
        console.warn('STT:',e.error);
        _active=false;
        setMic('idle');
      }
    };

    rec.onend=()=>{
      _on=false;
      if(_active&&!VOICE.speaking&&!_silenceTimer){
        // Reconocimiento terminó pero sesión sigue: reiniciar
        _restartTimer=setTimeout(()=>{if(_active&&!_on)startRec();},300);
      } else if(!_active){
        setMic('idle');
      }
    };

    return rec;
  }

  let _rec=makeRec();

  function startRec(){
    if(_on)return;
    try{_rec=makeRec();_rec.start();}
    catch(e){console.warn('STT start:',e);_active=false;setMic('idle');}
  }

  function start(){
    if(_active)return;
    if(VOICE.speaking){const s=getSynth();if(s)s.cancel();VOICE.speaking=false;}
    _active=true;
    _accum='';
    clrTimers();
    startRec();
  }

  function stop(){
    _active=false;
    clrTimers();
    // Si hay acumulado, enviarlo; si no, simplemente parar
    if(_accum.trim()){flush();}
    else{_accum='';if(_on)try{_rec.stop();}catch(e){}setMic('idle');}
  }

  micBtn.addEventListener('click',()=>_active?stop():start());

  return{available:true,start,stop,
    _onTTSDone(){/* hook para futuro modo conversación */}
  };
})();
// ══════════════════════════════════════════════════════════════════
const appEl=document.getElementById('app');
let _lastH=0,_resizeT=null;

function setAppHeight(){
  if(CSS.supports('height','1dvh'))return;
  const h=window.innerHeight;
  if(Math.abs(h-_lastH)<60)return;
  _lastH=h;appEl.style.height=h+'px';
}
function setAppHeightD(){clearTimeout(_resizeT);_resizeT=setTimeout(setAppHeight,120);}
window.addEventListener('resize',setAppHeightD);
window.addEventListener('orientationchange',()=>setTimeout(setAppHeight,200));
setAppHeight();
</script>
