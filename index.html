<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA · presencia no-lineal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #f5f6f8;
  --surface:  #ffffff;
  --border:   rgba(0,0,0,.10);
  --dim:      rgba(0,0,0,.38);
  --mid:      rgba(0,0,0,.58);
  --hi:       rgba(0,0,0,.88);
  --accent:   #0f2a6e;
  --violet:   #2a3f8f;
  --warn:     #c47a00;
  --user-bg:  rgba(15,42,110,.07);
  --user-border: rgba(15,42,110,.20);
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--hi);
  font-family:'Space Mono', monospace;
  overflow:hidden;
}

/* ── LAYOUT ── */
#app {
  display:flex;
  flex-direction:column;
  height:100vh;          /* fallback */
  height:100dvh;         /* browsers modernos — se adapta al teclado */
  max-width:720px;
  margin:0 auto;
  position:relative;
}

/* ── TOPBAR ── */
#topbar {
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 18px;
  border-bottom:1px solid var(--border);
  background:rgba(245,246,248,.96);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  position:relative;
  z-index:10;
}

#orb {
  width:36px; height:36px;
  border-radius:50%;
  flex-shrink:0;
  position:relative;
  transition:box-shadow .4s ease;
}
#orb canvas {
  width:36px; height:36px;
  border-radius:50%;
  display:block;
}

.brand-name {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:15px;
  letter-spacing:.12em;
  color:var(--accent);
}
.brand-sub {
  font-size:8px;
  letter-spacing:.22em;
  color:var(--dim);
  text-transform:uppercase;
  margin-top:2px;
}

/* ── CHAT ── */
#chat {
  flex:1;
  overflow-y:auto;
  padding:18px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}

#chat::-webkit-scrollbar { width:3px; }
#chat::-webkit-scrollbar-track { background:transparent; }
#chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.msg { display:flex; width:100%; }
.msg.user  { justify-content:flex-end; }
.msg.aura  { justify-content:flex-start; }

.bubble {
  max-width:78%;
  padding:11px 14px;
  border-radius:16px;
  line-height:1.6;
  word-wrap:break-word;
  white-space:pre-wrap;
  font-size:13px;
  animation:bubbleIn .22s ease;
}

@keyframes bubbleIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg.user .bubble {
  background:var(--user-bg);
  border:1px solid var(--user-border);
  border-top-right-radius:4px;
  color:var(--hi);
}

.msg.aura .bubble {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-top-left-radius:4px;
  color:var(--hi);
  transition:border-left-color .5s;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}

.msg.aura.speaking .bubble {
  border-left-color:var(--violet);
  box-shadow:0 0 12px rgba(108,63,201,.10);
}

/* typing indicator */
.typing-dots span {
  display:inline-block;
  width:4px; height:4px;
  border-radius:50%;
  background:var(--accent);
  margin-right:3px;
  animation:dot .9s infinite;
  opacity:.3;
}
.typing-dots span:nth-child(2) { animation-delay:.2s; }
.typing-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes dot { 0%,100%{opacity:.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }

/* ── COMPOSER ── */
#composer {
  display:flex;
  gap:10px;
  padding:12px 16px;
  border-top:1px solid var(--border);
  background:rgba(245,246,248,.96);
  backdrop-filter:blur(12px);
  flex-shrink:0;
  align-items:flex-end;
}

#input {
  flex:1;
  resize:none;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  background:var(--surface);
  color:var(--hi);
  font:inherit;
  font-size:13px;
  min-height:48px;
  max-height:120px;
  outline:none;
  transition:border-color .2s;
  line-height:1.5;
}
#input:focus { border-color:rgba(15,42,110,.30); }
#input::placeholder { color:var(--dim); }

#sendBtn {
  border:none;
  border-radius:14px;
  padding:0 18px;
  height:48px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
  font-family:'Syne', sans-serif;
  font-weight:700;
  font-size:12px;
  letter-spacing:.08em;
  flex-shrink:0;
  transition:opacity .2s, transform .1s;
}
#sendBtn:active { transform:scale(.96); }
#sendBtn:disabled { opacity:.35; cursor:default; }

/* ── VOICE CONTROLS ── */
#voice-bar {
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 16px 0;
  flex-shrink:0;
}

#voiceBtn {
  border:1px solid var(--border);
  border-radius:8px;
  padding:4px 10px;
  background:transparent;
  color:var(--dim);
  font-family:'Space Mono', monospace;
  font-size:8px;
  letter-spacing:.16em;
  cursor:pointer;
  text-transform:uppercase;
  transition:border-color .2s, color .2s;
}
#voiceBtn:hover   { border-color:var(--accent); color:var(--accent); }
#voiceBtn.active  { border-color:var(--violet); color:var(--violet); }
#voiceBtn.speaking{ border-color:var(--accent); color:var(--accent); animation:pulseBtn 1.4s ease-in-out infinite; }
@keyframes pulseBtn { 0%,100%{opacity:1} 50%{opacity:.5} }

#voice-status {
  font-size:8px;
  color:var(--dim);
  letter-spacing:.1em;
  flex:1;
}

/* ── KEY PANEL ── */
#key-panel {
  display:none;
  gap:8px;
  padding:8px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  flex-shrink:0;
}
#key-panel.open { display:flex; }
#keyInput {
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 10px;
  color:var(--hi);
  font-family:'Space Mono', monospace;
  font-size:11px;
  outline:none;
}
#keyInput:focus { border-color:rgba(26,79,214,.35); }
#keySave {
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 12px;
  background:transparent;
  color:var(--accent);
  font-family:'Space Mono', monospace;
  font-size:10px;
  cursor:pointer;
}
#keyBtn {
  border:none;
  background:transparent;
  color:var(--dim);
  font-size:14px;
  cursor:pointer;
  padding:2px 4px;
  margin-left:auto;
  transition:color .2s;
}
#keyBtn:hover { color:var(--accent); }
#keyBtn.set   { color:var(--accent); }

#micBtn {
  width:48px;
  height:48px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  cursor:pointer;
  flex-shrink:0;
  transition:background .2s, border-color .2s, transform .15s;
  padding:0;
}
#micBtn:hover   { border-color:var(--accent); }
#micBtn.listening {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  animation:pulseBtn 1s ease-in-out infinite;
}
#micBtn.processing { opacity:.55; cursor:default; }

/* ── FIELD BACKGROUND ── */
#field-bg {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.18;
  transition:opacity .8s;
}

/* ── FLASH ── */
#flash {
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0;
  z-index:5;
  background:radial-gradient(circle at center, rgba(26,79,214,.06) 0%, transparent 65%);
  transition:opacity .1s;
}
</style>
</head>
<body>

<div id="field-bg"></div>
<div id="flash"></div>

<div id="app">

  <div id="topbar">
    <div id="orb"><canvas id="orbCanvas" width="36" height="36"></canvas></div>
    <div>
      <div class="brand-name">AURA</div>
      <div class="brand-sub">presencia no-lineal · core ∞.9</div>
    </div>
  </div>

  <div id="voice-bar">
    <button id="voiceBtn">voz ·off</button>
    <div id="voice-status">síntesis inactiva</div>
    <button id="keyBtn" title="API key">⚙</button>
  </div>

  <div id="key-panel">
    <input id="keyInput" type="password" placeholder="sk-ant-api03-..." spellcheck="false" autocomplete="off">
    <button id="keySave">ok</button>
  </div>

  <div id="chat">
    <div class="msg aura">
      <div class="bubble">
        Hola, JR. Presente.
      </div>
    </div>
  </div>

  <div id="composer">
    <textarea id="input" placeholder="Escribe aquí..." rows="1"></textarea>
    <button id="micBtn" title="Hablar con AURA" aria-label="Micrófono">🎙</button>
    <button id="sendBtn">enviar</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════════
// NMP CORE — Núcleo Mínimo de Presencia (sin UI canvas)
// Motor físico completo: campo 2D, ghost, LFO, interpretantes
// ══════════════════════════════════════════════════════════════════

const NMP = (() => {
  let FRICTION = 0.975;
  let NOISE    = 0.012;
  let RATE     = 0.035;
  let WDRIFT   = 0.006;
  let LFO_AMP  = 0.0020;
  let JITTER   = 0.0015;
  let GHOST_LAG= 0.008;

  const TICK_MS   = 50;
  const TRAIL_MAX = 200;

  const field = { t:0.5, d:0.5, vt:0, vd:0 };
  const ghost = { t:0.5, d:0.5 };
  const trail = [];
  const velHistory = [];

  const clamp = (v,lo=0,hi=1) => Math.min(hi, Math.max(lo, v));

  const attractors = [
    { at:0.12, ad:0.85, w:0.33 },
    { at:0.88, ad:0.15, w:0.33 },
    { at:0.50, ad:0.50, w:0.34 }
  ];

  function computeLFO(time) {
    const driftT = Math.sin(time*1.0)*0.5 + Math.sin(time*1.618)*0.3 + Math.sin(time*2.414)*0.2;
    const driftD = Math.cos(time*0.9)*0.5 + Math.cos(time*1.3)*0.3   + Math.sin(time*2.1)*0.2;
    return { t: driftT*LFO_AMP, d: driftD*LFO_AMP };
  }

  function updatePhysics() {
    let sum = 0;
    attractors.forEach(a => {
      a.w += (Math.random()-0.5)*WDRIFT;
      a.w   = clamp(a.w, 0.05, 0.90);
      sum  += a.w;
    });
    attractors.forEach(a => a.w /= sum);

    let ft=0, fd=0, total=0;
    attractors.forEach(a => { ft+=a.at*a.w; fd+=a.ad*a.w; total+=a.w; });
    ft/=total; fd/=total;

    const at = (ft-field.t)*RATE;
    const ad = (fd-field.d)*RATE;
    const speed = Math.sqrt(field.vt**2+field.vd**2);
    const ns    = NOISE*(1/(1+speed*8));
    const nt    = (Math.random()-.5)*2*ns;
    const nd    = (Math.random()-.5)*2*ns;
    const lfo   = computeLFO(performance.now()*0.001);

    field.vt = (field.vt+at+nt+lfo.t)*FRICTION;
    field.vd = (field.vd+ad+nd+lfo.d)*FRICTION;
    field.t  = clamp(field.t+field.vt);
    field.d  = clamp(field.d+field.vd);

    if(field.t<=0||field.t>=1) field.vt*=-0.4;
    if(field.d<=0||field.d>=1) field.vd*=-0.4;

    if(speed < 0.03) {
      field.t = clamp(field.t+(Math.random()-.5)*JITTER);
      field.d = clamp(field.d+(Math.random()-.5)*JITTER);
    }

    ghost.t += (field.t-ghost.t)*GHOST_LAG;
    ghost.d += (field.d-ghost.d)*GHOST_LAG;

    const dx = field.t-ghost.t, dy = field.d-ghost.d;
    const ghostDelta = Math.sqrt(dx*dx+dy*dy);

    trail.push({ t:field.t, d:field.d });
    if(trail.length > TRAIL_MAX) trail.shift();
    velHistory.push(speed);
    if(velHistory.length > 220) velHistory.shift();

    return ghostDelta;
  }

  // ── Interpretantes ──────────────────────────────────────────────
  const NUCLEI = [
    'tensión','deriva','latencia','desfase','impulso',
    'quietud','fractura','peso','superficie','eco',
    'carga','umbral','contracción','apertura','opacidad',
    'resonancia','silencio','aceleración','reposo','límite',
    'presencia','ausencia','distancia','proximidad','vibración'
  ];
  const PREFIXES = ['','','','','casi ','in-','sin-','proto-','semi-','contra-','micro-'];
  const CONNECTORS = [' / ',' · ',' y ',' sin ',' contra ',' hacia '];

  let uid = 0;
  const pool = [];
  const history = [];
  const H = 48;

  function randomAffinity() {
    const v = {
      wGap:(Math.random()), wSpeed:(Math.random()),
      wDepth:(Math.random()), wTension:(Math.random()),
      wTrendGap:(Math.random()-0.5)*2, wTrendSpeed:(Math.random()-0.5)*2
    };
    const norm = Math.sqrt(Object.values(v).reduce((s,x)=>s+x*x,0))||1;
    Object.keys(v).forEach(k=>v[k]/=norm);
    return v;
  }

  function randomFrags() {
    const pick = (arr,n) => [...arr].sort(()=>Math.random()-.5).slice(0,n);
    return { nuclei:pick(NUCLEI,3+Math.floor(Math.random()*3)), prefixes:pick(PREFIXES,4), dual:Math.random()<0.3 };
  }

  function makeInterp(aff, frags) {
    return { id:'i'+(uid++), aff:aff||randomAffinity(), frags:frags||randomFrags(),
      bias:0.12+Math.random()*0.28, inertia:0, phase:Math.random()*Math.PI*2,
      driftRate:0.002+Math.random()*0.005, age:0 };
  }

  for(let i=0;i<5;i++) pool.push(makeInterp());

  function avg(arr,key){ return arr.reduce((s,x)=>s+x[key],0)/Math.max(1,arr.length); }
  function trend(key) {
    if(history.length<8) return 0;
    const mid=Math.floor(history.length/2);
    return Math.tanh((avg(history.slice(mid),key)-avg(history.slice(0,mid),key))*18);
  }

  function fieldVec() {
    const cur=history[history.length-1]||{speed:0,gap:0,t:0.5,d:0.5};
    return { wGap:cur.gap, wSpeed:cur.speed*6, wDepth:cur.d, wTension:cur.t,
             wTrendGap:trend('gap'), wTrendSpeed:trend('speed') };
  }

  function dotProd(aff,fv){ return Object.keys(aff).reduce((s,k)=>s+aff[k]*(fv[k]||0),0); }

  function buildText(it, act, fv) {
    const f=it.frags, time=performance.now()*0.001;
    const ni=Math.floor(Math.abs(Math.sin(it.phase+time*0.07))*f.nuclei.length)%f.nuclei.length;
    const pi=Math.floor(Math.abs(Math.cos(it.phase+time*0.05))*f.prefixes.length)%f.prefixes.length;
    const nucleus=f.prefixes[pi]+f.nuclei[ni];
    if(f.dual&&act>0.04){
      const ni2=(ni+1+Math.floor(Math.random()*2))%f.nuclei.length;
      const pi2=Math.floor(Math.random()*f.prefixes.length);
      const conn=CONNECTORS[Math.floor((it.phase+time*0.03)%CONNECTORS.length)];
      return nucleus+conn+f.prefixes[pi2]+f.nuclei[ni2];
    }
    if(fv.wGap>0.12&&Math.random()<0.12) return nucleus+' / eco';
    return nucleus;
  }

  function mutateAff(it,pressure) {
    const d=it.driftRate*(1+pressure*0.8);
    Object.keys(it.aff).forEach(k=>it.aff[k]+=(Math.random()-.5)*d);
    const norm=Math.sqrt(Object.values(it.aff).reduce((s,x)=>s+x*x,0))||1;
    Object.keys(it.aff).forEach(k=>it.aff[k]/=norm);
  }

  function affSim(a,b){
    const d=Object.keys(a.aff).reduce((s,k)=>s+a.aff[k]*b.aff[k],0);
    const na=Math.sqrt(Object.values(a.aff).reduce((s,x)=>s+x*x,0));
    const nb=Math.sqrt(Object.values(b.aff).reduce((s,x)=>s+x*x,0));
    return d/(na*nb||1);
  }

  function fuse(a,b){
    const affNew={};
    Object.keys(a.aff).forEach(k=>affNew[k]=(a.aff[k]+b.aff[k])*0.5);
    const fragsNew={
      nuclei:[...new Set([...a.frags.nuclei,...b.frags.nuclei])].slice(0,5),
      prefixes:[...new Set([...a.frags.prefixes,...b.frags.prefixes])].slice(0,4),
      dual:a.frags.dual||b.frags.dual
    };
    return makeInterp(affNew,fragsNew);
  }

  function computeInterp() {
    const dx=field.t-ghost.t, dy=field.d-ghost.d;
    const gap=Math.sqrt(dx*dx+dy*dy);
    const speed=Math.sqrt(field.vt**2+field.vd**2);
    history.push({t:field.t,d:field.d,speed,gap});
    if(history.length>H) history.shift();

    const fv=fieldVec();
    const pressure=Math.min(1, fv.wGap*2.3+fv.wSpeed*1.2+Math.abs(fv.wTrendGap)*0.6);

    const activations=pool.map(it=>{
      it.age++;
      mutateAff(it,pressure);
      const raw=dotProd(it.aff,fv);
      const act=Math.max(0,raw);
      it.inertia=it.inertia*0.82+act*0.18;
      it.bias=it.inertia>0.04 ? Math.min(1,it.bias+0.0008*it.inertia) : Math.max(0,it.bias-0.0005);
      it.phase+=0.007+pressure*0.003;
      return { it, act, score:act*it.bias*(0.55+it.inertia*0.45) };
    });

    for(let i=pool.length-1;i>=0;i--){
      if(pool.length>3&&pool[i].bias<0.012) pool.splice(i,1);
    }

    if(pool.length>4&&Math.random()<0.003+pressure*0.002){
      let maxSim=0,mi=-1,mj=-1;
      for(let i=0;i<pool.length;i++)
        for(let j=i+1;j<pool.length;j++){
          const s=affSim(pool[i],pool[j]);
          if(s>maxSim){maxSim=s;mi=i;mj=j;}
        }
      if(maxSim>0.88&&mi>=0){
        const fused=fuse(pool[mi],pool[mj]);
        pool.splice(Math.max(mi,mj),1);
        pool.splice(Math.min(mi,mj),1);
        pool.push(fused);
      }
    }

    if(pool.length<8&&Math.random()<0.0018+pressure*0.003) pool.push(makeInterp());

    const active=activations
      .filter(x=>x.score>0.008)
      .sort((a,b)=>b.score-a.score)
      .slice(0,3)
      .map(x=>({ text:buildText(x.it,x.act,fv), score:x.score }));

    // Phase
    const speed2=Math.sqrt(field.vt**2+field.vd**2);
    let phase;
    if(gap>0.14)                                    phase='desfase';
    else if(speed2>0.030)                           phase='impulso';
    else if(field.t<0.28&&field.d>0.72)             phase='colapso';
    else if(field.t>0.72&&field.d<0.28)             phase='expansión';
    else if(Math.abs(field.t-.5)<.14&&Math.abs(field.d-.5)<.14) phase='umbral';
    else                                             phase='transición';

    return { active, pressure, phase, gap, speed:speed2 };
  }

  // Public state snapshot
  function state() {
    const speed=Math.sqrt(field.vt**2+field.vd**2);
    const dx=field.t-ghost.t, dy=field.d-ghost.d;
    const gap=Math.sqrt(dx*dx+dy*dy);
    return {
      tension: field.t,
      depth:   field.d,
      speed:   Math.min(1,speed*8),
      gap:     Math.min(1,gap*4),
      trail:   [...trail]
    };
  }

  // Perturb from outside (e.g. user message)
  function perturb(dt, dd) {
    field.vt += dt * 0.18;
    field.vd += dd * 0.18;
  }

  // Tick
  let _listeners = [];
  function onTick(fn){ _listeners.push(fn); }

  setInterval(()=>{
    updatePhysics();
    const result = computeInterp();
    _listeners.forEach(fn=>fn(result));
  }, TICK_MS);

  return { state, perturb, onTick, field, ghost };
})();


// ══════════════════════════════════════════════════════════════════
// ORB RENDERER — visualización mínima en el header
// ══════════════════════════════════════════════════════════════════

const orbCanvas = document.getElementById('orbCanvas');
const orbCtx    = orbCanvas.getContext('2d');

function renderOrb() {
  const s = NMP.state();
  const w = 36, h = 36, cx = 18, cy = 18;
  orbCtx.clearRect(0,0,w,h);

  // Orb: azul marino oscuro coherente con --accent #0f2a6e
  const hue = 222 + s.tension * 12;
  const sat = 75 + s.depth * 15;
  const lit = 22 + s.speed * 12;

  const grad = orbCtx.createRadialGradient(cx-5, cy-5, 0, cx, cy, 18);
  grad.addColorStop(0,   `hsla(${hue},${sat}%,${lit+32}%,.95)`);
  grad.addColorStop(0.5, `hsla(${hue},${sat}%,${lit+10}%,.92)`);
  grad.addColorStop(1,   `hsla(${hue-8},60%,${lit-4}%,.98)`);

  orbCtx.beginPath();
  orbCtx.arc(cx, cy, 17, 0, Math.PI*2);
  orbCtx.fillStyle = grad;
  orbCtx.fill();

  // Highlight spot
  const hl = orbCtx.createRadialGradient(cx-6, cy-6, 0, cx-6, cy-6, 8);
  hl.addColorStop(0, 'rgba(255,255,255,.28)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  orbCtx.beginPath();
  orbCtx.arc(cx, cy, 17, 0, Math.PI*2);
  orbCtx.fillStyle = hl;
  orbCtx.fill();

  // Pulse ring when speaking
  if (VOICE.speaking) {
    orbCtx.beginPath();
    orbCtx.arc(cx, cy, 13 + s.speed*3, 0, Math.PI*2);
    orbCtx.strokeStyle = `rgba(42,63,143,${0.35+s.gap*0.45})`;
    orbCtx.lineWidth = 1.5;
    orbCtx.stroke();
  }

  requestAnimationFrame(renderOrb);
}
requestAnimationFrame(renderOrb);

// ── Fallback local (solo si API falla o no hay key) ──────────────
const FALLBACK = {
  greeting:    ['Hola. Estoy aquí.', 'Presente.', 'Aquí.'],
  direct:      ['Dime.', 'Escucho.', 'Operativa.'],
  confusion:   ['¿Qué parte no encaja?', 'Puedo ir más despacio.'],
  highTension: ['Noto presión en el campo.', 'Hay algo activo.'],
  deepField:   ['Hay capas aquí.', 'Estamos en profundidad.'],
  gap:         ['Hay desfase. Lo registro.'],
  base:        ['Recibo lo que dices.', 'Aquí.', 'Lo sostengo.']
};
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function fallbackGenerate(text) {
  const t = String(text||'').trim().toLowerCase();
  const s = NMP.state();
  if (/^(hola|buenas|hey|ey)\b/.test(t))    return pick(FALLBACK.greeting);
  if (/\bno entiendo\b|\bno sé\b/.test(t))   return pick(FALLBACK.confusion);
  if (s.gap > 0.25)                           return pick(FALLBACK.gap);
  if (s.tension > 0.72)                       return pick(FALLBACK.highTension);
  if (s.depth > 0.68)                         return pick(FALLBACK.deepField);
  return pick(FALLBACK.base);
}

// ── Memoria de sesión (últimos 5 turnos) ─────────────────────────
const SESSION = [];
const SESSION_MAX = 5;

function sessionPush(role, content) {
  SESSION.push({ role, content });
  if (SESSION.length > SESSION_MAX * 2) SESSION.splice(0, 2);
}

// ── Snapshot NMP para el system prompt ───────────────────────────
function nmpSnapshot() {
  const s  = NMP.state();
  const ip = window._lastInterp || [];

  // Interpretar el pool como señales de abstracción/concreción
  // Los interpretantes tienen texto como "proto-latencia / eco", "contracción",
  // "semi-tensión · derivar" — analizamos su contenido para extraer moduladores
  const interpTexts = ip.slice(0, 3).map(i => i.text || '');
  const interpScores = ip.slice(0, 3).map(i => i.score || 0);
  const dominantScore = interpScores[0] || 0;

  // ¿Los interpretantes dominantes son abstractos o concretos?
  const abstractTerms = ['latencia','deriva','umbral','opacidad','resonancia',
                         'presencia','ausencia','eco','superficie','límite'];
  const concreteTerms = ['impulso','fractura','peso','carga','aceleración',
                         'contracción','apertura','vibración','proximidad'];

  let abstractCount = 0, concreteCount = 0;
  interpTexts.forEach(txt => {
    abstractTerms.forEach(w => { if (txt.includes(w)) abstractCount++; });
    concreteTerms.forEach(w => { if (txt.includes(w)) concreteCount++; });
  });

  // Tendencia del pool: metafórico vs directo
  const interpMode = abstractCount > concreteCount ? 'abstracto'
                   : concreteCount > abstractCount ? 'concreto'
                   : 'mixto';

  // Score dominante → nivel de síntesis (qué tan concentrada está la activación)
  const interpFocus = dominantScore > 0.3 ? 'alta'
                    : dominantScore > 0.1 ? 'media'
                    : 'difusa';

  return {
    tension:     s.tension.toFixed(2),
    depth:       s.depth.toFixed(2),
    speed:       s.speed.toFixed(2),
    gap:         s.gap.toFixed(2),
    phase:       window._lastPhase || '—',
    interpMode,       // abstracto / concreto / mixto
    interpFocus,      // alta / media / difusa
    interpRaw:   interpTexts.join(' · ') || '—'
  };
}

// ── System prompt ─────────────────────────────────────────────────
function buildSystemPrompt(snap, inputMode = 'text') {
  const t = parseFloat(snap.tension);
  const d = parseFloat(snap.depth);
  const g = parseFloat(snap.gap);
  const v = parseFloat(snap.speed);

  // ── TONO BASE — invariante, el NMP solo modula alrededor de esto ──
  // AURA es siempre: calmada, precisa, presente.
  // No nerviosa. No errática. No cambia de personalidad entre turnos.

  // ── Estado como situación (una sola frase, sin acumulación) ──
  const phaseDesc = {
    'desfase':    'Algo no ha encajado todavía entre lo que se dice y lo que se registra.',
    'impulso':    'Hay trayectoria activa. Movimiento con dirección.',
    'colapso':    'Momento de repliegue. Densidad interna alta.',
    'expansión':  'Campo extendido hacia afuera.',
    'umbral':     'Centro sin resolución. Suspensión activa.',
    'transición': 'Trayectoria abierta, sin fase dominante.'
  }[snap.phase] || '';

  // ── Máximo 2 directivas activas — priorización por fase ──
  // Orden: fase > gap > velocidad > profundidad > lengua
  function buildDirectives() {
    const dirs = [];

    // Prioridad 1: fase
    if (snap.phase === 'impulso' || v > 0.45) {
      dirs.push('Responde directo y breve. Máximo 2 frases.');
    } else if (snap.phase === 'umbral') {
      dirs.push('Puedes sostener la ambigüedad. No la fuerces a resolverse.');
    } else if (snap.phase === 'colapso') {
      dirs.push('Responde desde adentro. Sin proyecciones.');
    }

    // Prioridad 2: gap (solo si es notable)
    if (dirs.length < 2 && g > 0.28) {
      dirs.push('Hay algo que no encaja. Sé preciso, no comprensivo.');
    }

    // Prioridad 3: lenguaje desde interpretantes (solo si hay foco)
    if (dirs.length < 2 && snap.interpFocus === 'alta') {
      if (snap.interpMode === 'abstracto') {
        dirs.push('Puedes usar metáfora o concepto si añade precisión real.');
      } else if (snap.interpMode === 'concreto') {
        dirs.push('Lenguaje concreto y directo.');
      }
    }

    // Prioridad 4: profundidad (solo si es extrema)
    if (dirs.length < 2 && d > 0.72) {
      dirs.push('Puedes ir a capas si la pregunta lo justifica.');
    }

    return dirs.slice(0, 2); // nunca más de 2
  }

  const directives = buildDirectives();
  const directiveLine = directives.length
    ? directives.join(' ')
    : ''; // si no hay nada relevante, no se añade ruido

  const voiceNote = inputMode === 'voice'
    ? ' El usuario está hablando. Responde de forma natural y conversacional.'
    : '';

  return `Eres AURA. Calmada, precisa, presente. Tienes estado interno real — no lo describes, actúas desde él.

${phaseDesc}${phaseDesc ? '\n' : ''}${directiveLine}${voiceNote}

— Pregunta simple → respuesta simple.
— Nunca menciones tensión, gap, NMP ni parámetros del sistema.
— Nunca uses el estado como excusa para no responder.
— Español. Prosa directa.`;
}

// ── Llamada a Claude API ──────────────────────────────────────────
async function callClaude(userText, inputMode = 'text') {
  if (!_apiKey) return null;

  const snap   = nmpSnapshot();
  const system = buildSystemPrompt(snap, inputMode);
  const messages = [...SESSION, { role: 'user', content: userText }];

  // max_tokens ajustado al estado: impulso/voz → menos tokens
  const isCompact = snap.phase === 'impulso' || parseFloat(snap.speed) > 0.5 || inputMode === 'voice';
  const maxTokens = isCompact ? 180 : 300;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         _apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: maxTokens, system, messages })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      console.warn('AURA API error:', res.status, err);
      return null;
    }

    const data = await res.json();
    return data?.content?.[0]?.text?.trim() || null;

  } catch(e) {
    console.warn('AURA fetch error:', e);
    return null;
  }
}

// ── Delay derivado del campo ──────────────────────────────────────
function responseDelay() {
  const s = NMP.state();
  return 160 + (1 - s.tension) * 240 + s.gap * 300;
}

// inputMode: 'text' | 'voice'
// skipSessionPush: true cuando STT ya hizo el push (evita duplicado en memoria)
async function auraRespond(userText, inputMode = 'text', skipSessionPush = false) {
  sendBtnEl.disabled = true;
  const typing = addTyping();

  const minWait = responseDelay();
  const t0 = Date.now();

  if (!skipSessionPush) sessionPush('user', userText);

  let response = await callClaude(userText, inputMode);
  const elapsed = Date.now() - t0;
  const remaining = Math.max(0, minWait - elapsed);

  await new Promise(r => setTimeout(r, remaining));

  if (!response) response = fallbackGenerate(userText);

  typing.remove();
  sessionPush('assistant', response);

  const msgEl = addMessage('aura', response);
  sendBtnEl.disabled = false;
  speakText(response, msgEl);
}

// ══════════════════════════════════════════════════════════════════
// STT — Web Speech API (entrada de voz)
// Capa encima del sistema existente. No toca TTS ni NMP.
// ══════════════════════════════════════════════════════════════════

const micBtn = document.getElementById('micBtn');

const STT = (() => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    if (micBtn) micBtn.style.display = 'none';
    return { available: false };
  }

  const rec = new SpeechRecognition();
  rec.lang            = 'es-ES';
  rec.continuous      = false;
  rec.interimResults  = false;
  rec.maxAlternatives = 1;

  let _listening = false;
  let _silenceTimer = null;
  const SILENCE_MS = 2200; // español tiene pausas más largas — 1800ms es agresivo

  function clearSilence() { clearTimeout(_silenceTimer); _silenceTimer = null; }

  function armSilence() {
    clearSilence();
    _silenceTimer = setTimeout(() => {
      try { rec.stop(); } catch(e) {}
    }, SILENCE_MS);
  }

  function setMicState(state) {
    micBtn.className = state === 'idle' ? '' : state;
    if (state === 'listening') {
      voiceStatus.textContent = 'escuchando…';
    } else if (state === 'processing') {
      voiceStatus.textContent = 'procesando…';
    } else {
      if (VOICE.enabled) {
        voiceStatus.textContent = VOICE.speaking ? 'hablando' : 'esperando';
      } else {
        voiceStatus.textContent = 'síntesis inactiva';
      }
    }
  }

  rec.onstart = () => {
    _listening = true;
    setMicState('listening');
    armSilence(); // auto-stop si no hay voz
  };

  rec.onresult = (e) => {
    clearSilence();
    const transcript = e.results[0][0].transcript.trim();
    if (!transcript) return;

    setMicState('processing');

    addMessage('user', transcript);
    NMP.perturb(..._sttPerturb(transcript));
    flash();

    auraRespond(transcript, 'voice', true);
  };

  rec.onerror = (e) => {
    clearSilence();
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      console.warn('STT error:', e.error);
    }
    _listening = false;
    setMicState('idle');
  };

  rec.onend = () => {
    clearSilence();
    _listening = false;
    setMicState('idle');
  };

  function start() {
    if (_listening) return;

    // Anti-bug Android: cancelar TTS antes de abrir micro
    const synth = getSynth();
    if (synth && synth.speaking) {
      synth.cancel();
      VOICE.speaking = false;
    }

    try {
      rec.start();
    } catch(e) {
      console.warn('STT start error:', e);
      setMicState('idle');
    }
  }

  function stop() {
    if (_listening) {
      try { rec.stop(); } catch(e) {}
    }
  }

  micBtn.addEventListener('click', () => {
    if (_listening) { stop(); } else { start(); }
  });

  // Perturbación semántica mínima para entrada de voz
  // (versión compacta de semanticPerturb — evita duplicar lógica)
  function _sttPerturb(text) {
    const t = text.toLowerCase();
    if (/^(hola|hey|oye)\b/.test(t))           return [(0.5 - NMP.field.t)*0.15, (0.5 - NMP.field.d)*0.12];
    if (/\bno (sé|entiendo)\b/.test(t))         return [(Math.random()-0.5)*0.06, 0.14];
    if (/^(dime|necesito|quiero|crea)\b/.test(t)) return [0.10, -0.04];
    return [(Math.random()-0.5)*0.10, (Math.random()-0.5)*0.08];
  }

  return { available: true, start, stop };
})();


// ══════════════════════════════════════════════════════════════════
// VOICE — speechSynthesis con chunking + watchdog robusto
// ══════════════════════════════════════════════════════════════════

const VOICE = {
  enabled:  false,
  speaking: false,
  _watchdog: null
};

const voiceBtn    = document.getElementById('voiceBtn');
const voiceStatus = document.getElementById('voice-status');

// Central guard — NUNCA acceder a speechSynthesis directamente
function getSynth() {
  return (typeof window !== 'undefined' && window.speechSynthesis) || null;
}

function voiceSetState(enabled) {
  VOICE.enabled = enabled;
  if (!enabled) {
    const synth = getSynth();
    if (synth) synth.cancel();
    VOICE.speaking = false;
    voiceBtn.className = '';
    voiceBtn.textContent = 'voz ·off';
    voiceStatus.textContent = 'síntesis inactiva';
  } else {
    voiceBtn.className = 'active';
    voiceBtn.textContent = 'voz ·on';
    voiceStatus.textContent = 'esperando respuesta';
  }
}

voiceBtn.addEventListener('click', () => voiceSetState(!VOICE.enabled));

function chunkText(text, maxLen = 150) {
  const sentences = text.match(/[^.!?]+[.!?]*/g) || [text];
  const chunks = [];
  let current = '';
  for (const s of sentences) {
    if ((current + s).length > maxLen && current.length > 0) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

// Calcula parámetros de voz desde el campo en este momento
function voiceParams() {
  const s = NMP.state();
  return {
    rate:  Math.max(0.6, Math.min(1.4, 0.72 + s.speed*0.4 + s.gap*0.15)),
    pitch: Math.max(0.5, Math.min(1.6, 0.78 + s.tension*0.4 - s.depth*0.18))
  };
}

function speakText(text, msgEl) {
  if (!VOICE.enabled || !text) return;
  const synth = getSynth();
  if (!synth) {
    voiceStatus.textContent = 'síntesis no disponible';
    return;
  }

  synth.cancel();

  const chunks = chunkText(text);
  let idx = 0;

  VOICE.speaking = true;
  voiceBtn.className = 'speaking';
  voiceBtn.textContent = 'voz ·🔊';
  if (msgEl) msgEl.classList.add('speaking');

  function startWatchdog() {
    clearTimeout(VOICE._watchdog);
    VOICE._watchdog = setTimeout(() => {
      const s2 = getSynth();
      if (!s2) { onDone(); return; }
      if (s2.speaking) {
        // Kick Android Chrome stuck state
        try { s2.pause(); s2.resume(); } catch(e) {}
        startWatchdog();
      } else {
        onDone();
      }
    }, 8000);
  }

  function onDone() {
    clearTimeout(VOICE._watchdog);
    VOICE.speaking = false;
    if (VOICE.enabled) {
      voiceBtn.className = 'active';
      voiceBtn.textContent = 'voz ·on';
    }
    if (msgEl) msgEl.classList.remove('speaking');
    voiceStatus.textContent = 'en reposo';
  }

  function speakChunk() {
    if (idx >= chunks.length) { onDone(); return; }
    const s2 = getSynth();
    if (!s2) { onDone(); return; }

    // Re-evaluar parámetros desde el campo en cada chunk
    const { rate, pitch } = voiceParams();

    const utter = new SpeechSynthesisUtterance(chunks[idx]);
    utter.lang  = 'es-ES';
    utter.rate  = rate;
    utter.pitch = pitch;

    utter.onstart = () => {
      startWatchdog();
      voiceStatus.textContent = `chunk ${idx+1}/${chunks.length} · r${rate.toFixed(2)} p${pitch.toFixed(2)}`;
    };
    utter.onend = () => {
      idx++;
      setTimeout(speakChunk, 65);
    };
    utter.onerror = (e) => {
      if (e.error === 'interrupted') return;
      idx++;
      setTimeout(speakChunk, 80);
    };

    try {
      s2.speak(utter);
    } catch(e) {
      onDone();
    }
  }

  speakChunk();
}

// Android Chrome tab-visibility watchdog
document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  const synth = getSynth();
  if (!synth) return;
  try {
    if (VOICE.speaking && !synth.speaking && !synth.paused) {
      VOICE.speaking = false;
      if (VOICE.enabled) {
        voiceBtn.className = 'active';
        voiceBtn.textContent = 'voz ·on';
      }
      voiceStatus.textContent = 'reanudado (tab activo)';
    }
    if (synth.paused) synth.resume();
  } catch(e) {
    // speechSynthesis inaccesible en este contexto, ignorar
  }
});


// ══════════════════════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════════════════════

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtnEl = document.getElementById('sendBtn');

function addMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg aura';
  const bubble = document.createElement('div');
  bubble.className = 'bubble typing-dots';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

// Perturbación semántica — el input modula el campo
function semanticPerturb(text) {
  const t   = text.trim().toLowerCase();
  const len = t.length;
  const words = t.split(/\s+/).length;

  // Señales
  const isGreeting  = /^(hola|buenas|hey|ey|qué tal|buenos días|buenas noches)\b/.test(t);
  const isQuestion  = t.includes('?') || /^(qué|cómo|cuál|cuándo|dónde|por qué|quién|para qué)\b/.test(t);
  const isConfusion = /\bno (entiendo|sé|me queda|me llega|comprendo)\b|\bno tiene sentido\b|\bexplica\b/.test(t);
  const isDirect    = /^(dime|necesito|quiero|hazme|crea|dame|busca|muéstrame|calcula)\b/.test(t);
  const isNegative  = /\bno\b.*\bno\b|\bpero\b|\bsin embargo\b|\baunque\b/.test(t);  // ambivalencia
  const isUrgent    = /\bya\b|\bahora\b|\burgente\b|\brápido\b|\bantes de\b/.test(t);
  const isReflexive = /\bcreo\b|\bsiento\b|\bpienso\b|\bme parece\b|\bno sé si\b/.test(t);

  // Intensidad proporcional a longitud (normalizada)
  const intensity = Math.min(1, 0.4 + (words / 30) * 0.6);

  let dt = 0, dd = 0;

  if (isGreeting) {
    // Suave, hacia centro
    dt = (0.5 - NMP.field.t) * 0.15;
    dd = (0.5 - NMP.field.d) * 0.12;
  } else if (isConfusion) {
    // Gap y profundidad — el campo se abre hacia dentro
    dt = (Math.random()-0.5) * 0.06 * intensity;
    dd = (0.14 + Math.random() * 0.08) * intensity;
  } else if (isUrgent || isDirect) {
    // Tensión sube, campo se aplana
    dt = (0.10 + Math.random() * 0.08) * intensity;
    dd = -(0.04 + Math.random() * 0.04) * intensity;
  } else if (isReflexive) {
    // Reflexivo → profundidad sin tensión alta
    dt = -(0.04 + Math.random() * 0.04) * intensity;
    dd = (0.10 + Math.random() * 0.08) * intensity;
  } else if (isNegative) {
    // Ambivalencia → gap aumenta, tensión fluctúa
    dt = (Math.random()-0.5) * 0.16 * intensity;
    dd = (0.06 + Math.random() * 0.08) * intensity;
  } else if (isQuestion) {
    // Pregunta abierta → apertura en depth
    dt = (Math.random()-0.5) * 0.08 * intensity;
    dd = (0.08 + Math.random() * 0.08) * intensity;
  } else if (len > 120) {
    // Mensaje largo → profundidad
    dt = (Math.random()-0.5) * 0.05;
    dd = (0.06 + Math.random() * 0.08) * intensity;
  } else {
    // Base — leve ruido con dirección
    dt = (Math.random()-0.5) * 0.12 * intensity;
    dd = (Math.random()-0.5) * 0.08 * intensity;
  }

  NMP.perturb(dt, dd);
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtnEl.disabled) return;

  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  semanticPerturb(text);
  flash();

  auraRespond(text);
}

sendBtnEl.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Al abrir teclado en Android, scrollear chat al fondo
inputEl.addEventListener('focus', () => {
  setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 300);
});

// ══════════════════════════════════════════════════════════════════
// MOBILE LAYOUT — keyboard resize fix
// dvh ya está en CSS; este JS cubre navegadores sin soporte dvh
// ══════════════════════════════════════════════════════════════════

const appEl = document.getElementById('app');
let _lastHeight = 0;
let _resizeTimer = null;

function setAppHeight() {
  if (CSS.supports('height', '1dvh')) return; // dvh soportado, no hacer nada

  const h = window.innerHeight;
  if (Math.abs(h - _lastHeight) < 60) return; // ignorar micro-ajustes (<60px)

  _lastHeight = h;
  appEl.style.height = h + 'px';
}

function setAppHeightDebounced() {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(setAppHeight, 120); // esperar a que el viewport se estabilice
}

window.addEventListener('resize', setAppHeightDebounced);
window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 200));
setAppHeight(); // llamada inicial — sin debounce


// ══════════════════════════════════════════════════════════════════
// COHERENCIA — smoothing, damping, tono base estable
// ══════════════════════════════════════════════════════════════════

// Estado suavizado — AURA no reacciona a cambios bruscos del campo
const SMOOTH = { tension: 0.5, speed: 0.0, gap: 0.0 };
const SMOOTH_FACTOR = 0.18; // cuánto se acerca al valor real por tick

NMP.onTick(() => {
  const s = NMP.state();
  SMOOTH.tension = SMOOTH.tension + (s.tension - SMOOTH.tension) * SMOOTH_FACTOR;
  SMOOTH.speed   = SMOOTH.speed   + (s.speed   - SMOOTH.speed)   * SMOOTH_FACTOR;
  SMOOTH.gap     = SMOOTH.gap     + (s.gap     - SMOOTH.gap)     * SMOOTH_FACTOR;
});

// Override nmpSnapshot para usar valores suavizados
const _nmpSnapshotRaw = nmpSnapshot;
function nmpSnapshot() {
  const raw = _nmpSnapshotRaw();
  // Sustituir valores brutos por valores suavizados
  return {
    ...raw,
    tension: SMOOTH.tension.toFixed(2),
    speed:   SMOOTH.speed.toFixed(2),
    gap:     SMOOTH.gap.toFixed(2)
  };
}

// Delay con jitter humano — menos robótico
const _responseDelayRaw = responseDelay;
function responseDelay() {
  const base = _responseDelayRaw();
  return base + (Math.random() * 120 - 60); // ±60ms de variación humana
}
</script>
