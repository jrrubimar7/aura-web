<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA CORE</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#chat{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin-bottom:10px;
}

.user{color:#4ade80;}
.aura{color:#60a5fa;}

#inputbar{
  display:flex;
  padding:10px;
  background:#111827;
  position:fixed;
  bottom:0;
  width:100%;
}

#inp{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

#send{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

#chat{
  margin-bottom:70px; /* espacio para el input */
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputbar">
  <input id="inp" placeholder="Escribe..." />
  <button id="send">Enviar</button>
</div>

<script>
const chat = document.getElementById("chat");
const inp = document.getElementById("inp");
const sendBtn = document.getElementById("send");

function addMsg(type, text){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = (type === "user" ? "Tú: " : "Aura: ") + text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  const text = inp.value.trim();
  if(!text) return;

  addMsg("user", text);
  inp.value = "";

  // respuesta simulada
  setTimeout(()=>{
    addMsg("aura", "Respuesta simulada: " + text);
  }, 300);
}

sendBtn.onclick = send;
inp.addEventListener("keydown", e=>{
  if(e.key === "Enter") send();
});

// INIT
addMsg("aura", "Aura core iniciada correctamente.");
</script>

</body>
</html>
