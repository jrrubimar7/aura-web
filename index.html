<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA 2.0 · build 4</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="orb"></div>
      <div class="brand">
        <h1>AURA 2.0</h1>
        <p id="buildInfo">presencia conversacional · build 4 · core ?</p>
      </div>
    </header>

    <main id="chat" class="chat">
      <div class="msg aura">
        <div class="bubble">
          Hola, JR. AURA 2.0 está presente. No venimos a cerrar rápido, sino a abrir posibilidades.
        </div>
      </div>
    </main>

    <footer class="composer">
      <textarea id="input" placeholder="Escribe aquí..." rows="2"></textarea>
      <button id="sendBtn">Enviar</button>
    </footer>
  </div>

  <script src="./main.js"></script>
</body>
</html>
