<!DOCTYPE html>
<html>
<body>

<button onclick="start()">🎤 TEST MIC</button>

<script>
function start(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    alert("❌ STT NO SOPORTADO");
    return;
  }

  let r = new SR();
  r.lang = "es-ES";
  r.continuous = false;

  r.onstart = () => {
    console.log("START OK");
    alert("🎤 HABLA");
  };

  r.onresult = (e) => {
    alert("TEXTO: " + e.results[0][0].transcript);
  };

  r.onerror = (e) => {
    alert("ERROR: " + e.error);
  };

  r.onend = () => {
    console.log("END");
  };

  try{
    r.start();
  }catch(err){
    alert("FALLO START");
  }
}
</script>

</body>
</html>
