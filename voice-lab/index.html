<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Voice Lab v0.2</title>

<style>
body{
  margin:0;
  background:#0d1018;
  color:#e8ecf1;
  font-family:system-ui;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 0;
}

button{
  padding:14px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#7fffd4;
  color:#000;
  font-size:16px;
  cursor:pointer;
}

textarea{
  width:80%;
  max-width:700px;
  height:100px;
  margin-top:20px;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

h1{
  font-weight:500;
  text-align:center;
}

#stateLabel{
  margin-top:14px;
  font-size:14px;
  opacity:.85;
  text-align:center;
}

#modeRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:14px;
}

#modeRow button{
  min-width:110px;
}
</style>
</head>

<body>

<h1>AURA Voice Lab v0.2</h1>

<textarea id="text">AURA activa. El campo respira. La interpretación fluctúa entre tensión y calma.</textarea>

<div>
  <button onclick="speak()">Hablar</button>
  <button onclick="stop()">Parar</button>
</div>

<div id="stateLabel">Estado: neutro · rate 1.00 · pitch 1.00</div>

<div id="modeRow">
  <button onclick="setMode(0)">Calma</button>
  <button onclick="setMode(1)">Neutro</button>
  <button onclick="setMode(2)">Tensión</button>
</div>

<script>
let synth = window.speechSynthesis;
let mode = 1;

// 0 = calma, 1 = neutro, 2 = tensión
function getState(){
  if (mode === 0) {
    return { name: "calma", tension: 0.05, calma: 1.00, rate: 0.72, pitch: 0.75 };
  }
  if (mode === 2) {
    return { name: "tensión", tension: 1.00, calma: 0.00, rate: 1.45, pitch: 1.55 };
  }
  return { name: "neutro", tension: 0.50, calma: 0.50, rate: 1.00, pitch: 1.00 };
}

function speak(){
  stop();

  const text = document.getElementById("text").value;
  const state = getState();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-ES";

  // Forzado fuerte para notar diferencia
  utter.rate = state.rate;
  utter.pitch = state.pitch;
  utter.volume = 1;

  const voices = synth.getVoices();
  const esVoices = voices.filter(v => v.lang && v.lang.toLowerCase().includes("es"));

  if (esVoices.length) {
    utter.voice = esVoices[0];
  }

  console.log("AURA STATE:", state);
  synth.speak(utter);
}

function stop(){
  synth.cancel();
}

function setMode(nextMode){
  mode = nextMode;

  const label = document.getElementById("stateLabel");
  const s = getState();
  label.textContent = `Estado: ${s.name} · rate ${s.rate.toFixed(2)} · pitch ${s.pitch.toFixed(2)}`;
}

// fix Android voces
speechSynthesis.onvoiceschanged = () => {
  synth.getVoices();
  setMode(mode);
};

window.addEventListener("load", () => {
  setMode(1);
});
</script>

</body>
</html>
