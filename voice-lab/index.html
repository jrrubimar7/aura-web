<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Voice Lab v0.1</title>

<style>
body{
  margin:0;
  background:#0d1018;
  color:#e8ecf1;
  font-family:system-ui;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

button{
  padding:14px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#7fffd4;
  color:#000;
  font-size:16px;
  cursor:pointer;
}

textarea{
  width:80%;
  height:100px;
  margin-top:20px;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

h1{
  font-weight:500;
}
</style>
</head>

<body>

<h1>AURA Voice Lab v0.1</h1>

<textarea id="text">
AURA activa. El campo respira. La interpretación fluctúa entre tensión y calma.
</textarea>

<button onclick="speak()">Hablar</button>
<button onclick="stop()">Parar</button>

<script>

let synth = window.speechSynthesis;

function speak(){
  stop();

  const text = document.getElementById("text").value;

  const utter = new SpeechSynthesisUtterance(text);

  utter.lang = "es-ES";
  utter.rate = 1;
  utter.pitch = 1;

  // Selección de voz (Android fallback automático)
  const voices = synth.getVoices();
  const esVoice = voices.find(v => v.lang.includes("es"));

  if(esVoice) utter.voice = esVoice;

  synth.speak(utter);
}

function stop(){
  synth.cancel();
}

// cargar voces correctamente (Android fix)
speechSynthesis.onvoiceschanged = () => {
  synth.getVoices();
};

</script>

</body>
</html>
