<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA Voice Lab v0.4</title>

<style>
body{
  margin:0;
  background:#0d1018;
  color:#e8ecf1;
  font-family:system-ui;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px 0;
}

button{
  padding:14px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#7fffd4;
  color:#000;
  font-size:16px;
  cursor:pointer;
}

textarea{
  width:80%;
  max-width:700px;
  height:100px;
  margin-top:20px;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

h1{
  font-weight:500;
  text-align:center;
}

#stateLabel{
  margin-top:14px;
  font-size:14px;
  opacity:.85;
  text-align:center;
}

#subLabel{
  margin-top:8px;
  font-size:12px;
  opacity:.7;
  text-align:center;
}
</style>
</head>

<body>

<h1>AURA Voice Lab v0.4</h1>

<textarea id="text">AURA activa. El campo respira. La interpretación fluctúa entre tensión y calma.</textarea>

<div>
  <button onclick="speak()">Hablar</button>
  <button onclick="stop()">Parar</button>
</div>

<div id="stateLabel">Estado: esperando NMP...</div>
<div id="subLabel">Fuente: fallback</div>

<!-- NMP en segundo plano -->
<iframe id="nmpFrame" src="../nmp.html" style="display:none;" title="AURA NMP"></iframe>

<script>
let synth = window.speechSynthesis;

function readNMPFromIframe(){
  const frame = document.getElementById("nmpFrame");
  if(!frame || !frame.contentWindow) return null;

  try{
    const w = frame.contentWindow;

    // futuro: si existe window.NMP.state directamente
    if(w.NMP && w.NMP.state){
      return w.NMP.state;
    }

    // compatibilidad con el NMP actual
    if(w.field && w.ghost){
      const dx = (w.field.t || 0) - (w.ghost.t || 0);
      const dy = (w.field.d || 0) - (w.ghost.d || 0);
      const gap = Math.sqrt(dx*dx + dy*dy);
      const speed = Math.sqrt((w.field.vt || 0) * (w.field.vt || 0) + (w.field.vd || 0) * (w.field.vd || 0));

      return {
        tension: Math.max(0, Math.min(1, w.field.t ?? 0.5)),
        depth: Math.max(0, Math.min(1, w.field.d ?? 0.5)),
        speed: Math.max(0, Math.min(1, speed * 8)),
        gap: Math.max(0, Math.min(1, gap * 4))
      };
    }
  }catch(err){
    console.log("NMP iframe aún no accesible:", err);
  }

  return null;
}

// detector NMP real o fallback
function getState(){
  const nmp = readNMPFromIframe();

  if(nmp){
    const rate = 0.72 + (nmp.speed * 0.55) + (nmp.gap * 0.20);
    const pitch = 0.72 + (nmp.tension * 0.55) - (nmp.depth * 0.12);

    return {
      name: "NMP real",
      source: "iframe ../nmp.html",
      rate: Math.max(0.6, Math.min(1.7, rate)),
      pitch: Math.max(0.6, Math.min(1.7, pitch)),
      raw: nmp
    };
  }

  // fallback simulado
  const t = Date.now() * 0.001;
  return {
    name: "simulado",
    source: "fallback",
    rate: 0.8 + Math.sin(t) * 0.4,
    pitch: 0.8 + Math.cos(t) * 0.4,
    raw: null
  };
}

function updateStatus(){
  const state = getState();
  document.getElementById("stateLabel").textContent =
    `Estado: ${state.name} · rate ${state.rate.toFixed(2)} · pitch ${state.pitch.toFixed(2)}`;
  document.getElementById("subLabel").textContent =
    state.raw
      ? `Fuente: ${state.source} · tension ${state.raw.tension.toFixed(2)} · depth ${state.raw.depth.toFixed(2)} · speed ${state.raw.speed.toFixed(2)} · gap ${state.raw.gap.toFixed(2)}`
      : `Fuente: ${state.source}`;
}


function speak(){
  console.log("🔥 v0.5 activo");

  stop();

  const text = document.getElementById("text").value;
  const state = getState();

  const parts = text.split(/([.,!?])/).filter(p => p.trim() !== "");

  let i = 0;

  function speakNext(){
    if(i >= parts.length) return;

    let chunk = parts[i];
    let pauseMark = parts[i+1] || "";

    const utter = new SpeechSynthesisUtterance(chunk + pauseMark);

    utter.lang = "es-ES";
    utter.volume = 1;

    let rate = state.rate;
    let pitch = state.pitch;

    rate += state.raw ? state.raw.tension * 0.15 : 0;
    pitch -= state.raw ? state.raw.depth * 0.2 : 0;

    const jitter = state.raw ? state.raw.gap * 0.1 : 0;
    rate += (Math.random() - 0.5) * jitter;
    pitch += (Math.random() - 0.5) * jitter;

    utter.rate = Math.max(0.6, Math.min(1.7, rate));
    utter.pitch = Math.max(0.6, Math.min(1.7, pitch));

    const voices = synth.getVoices();
    const es = voices.find(v => v.lang && v.lang.toLowerCase().includes("es"));
    if(es) utter.voice = es;

    utter.onend = () => {
      let pause = 80;

      if(pauseMark.includes(".")) pause = 220;
      if(pauseMark.includes(",")) pause = 120;
      if(pauseMark.includes("!")) pause = 260;
      if(pauseMark.includes("?")) pause = 260;

      if(state.raw) pause += state.raw.gap * 180;

      setTimeout(() => {
        i += 2;
        speakNext();
      }, pause);
    };

    synth.cancel();
    synth.speak(utter);
  }

  document.getElementById("stateLabel").textContent =
    `Estado: ${state.name} · rate ${state.rate.toFixed(2)} · pitch ${state.pitch.toFixed(2)}`;

  document.getElementById("subLabel").textContent =
    state.raw
      ? `Fuente: ${state.source} · tension ${state.raw.tension.toFixed(2)} · depth ${state.raw.depth.toFixed(2)} · speed ${state.raw.speed.toFixed(2)} · gap ${state.raw.gap.toFixed(2)}`
      : `Fuente: ${state.source}`;

  console.log("AURA STATE:", state);

  speakNext();
}


  // UI
  document.getElementById("stateLabel").textContent =
    `Estado: ${state.name} · rate ${state.rate.toFixed(2)} · pitch
  stop();

  const text = document.getElementById("text").value;
  const state = getState();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-ES";
  utter.rate = state.rate;
  utter.pitch = state.pitch;
  utter.volume = 1;

  const voices = synth.getVoices();
  const es = voices.find(v => v.lang && v.lang.toLowerCase().includes("es"));
  if(es) utter.voice = es;

  document.getElementById("stateLabel").textContent =
    `Estado: ${state.name} · rate ${state.rate.toFixed(2)} · pitch ${state.pitch.toFixed(2)}`;
  document.getElementById("subLabel").textContent =
    state.raw
      ? `Fuente: ${state.source} · tension ${state.raw.tension.toFixed(2)} · depth ${state.raw.depth.toFixed(2)} · speed ${state.raw.speed.toFixed(2)} · gap ${state.raw.gap.toFixed(2)}`
      : `Fuente: ${state.source}`;

  console.log("AURA STATE:", state);
  synth.speak(utter);
}

function stop(){
  synth.cancel();
}

speechSynthesis.onvoiceschanged = () => {
  synth.getVoices();
};

window.addEventListener("load", () => {
  updateStatus();
  setInterval(updateStatus, 1200);
});
</script>

</body>
</html>
