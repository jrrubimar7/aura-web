<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AURA rescue shell</title>
<style>
html,body{margin:0;height:100%;background:#f8f9fb;font-family:system-ui}
#aura-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
.orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,#7eb8ff,#1a56db)}
#app{display:none;height:100%}
#app.visible{display:block}
#setup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px}
#setup.show{display:flex}
#diag{position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-size:12px;padding:6px;font-family:monospace}
</style>
</head>
<body>

<div id="aura-splash">
  <div class="orb"></div>
  <div>AURA ∞.Ω</div>
</div>

<div id="setup">
  <input id="akey" placeholder="API opcional"/>
  <button id="go">ENTRAR</button>
</div>

<div id="app">
  <div style="padding:20px">AURA SHELL OK</div>
</div>

<div id="diag"></div>

<script>
(function(){
  function log(m){
    document.getElementById('diag').textContent += "\n"+m;
  }

  function showApp(){
    document.getElementById('app').classList.add('visible');
    document.getElementById('setup').classList.remove('show');
    document.getElementById('aura-splash').style.display='none';
    log('showApp ok');
  }

  function showSetup(){
    document.getElementById('setup').classList.add('show');
    document.getElementById('aura-splash').style.display='none';
    log('setup visible');
  }

  document.addEventListener('DOMContentLoaded',function(){
    log('DOM ready');

    document.getElementById('go').addEventListener('click',function(){
      log('click entrar');
      showApp();
    });

    setTimeout(showSetup,1000);
  });
})();
</script>

</body>
</html>
